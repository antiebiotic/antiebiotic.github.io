<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kanban v1.3.1 • 카카오톡 스타일 칸반보드</title>
  <meta name="application-name" content="Kanban">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kanban">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Kanban v1.3.1 • KakaoTalk-style project board with WebRTC sync">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FEE500'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50' font-weight='bold' fill='%23000' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%23FEE500'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='96' font-weight='bold' fill='%23000' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-primary:#ffffff; --bg-secondary:#f9f9fb; --bg-tertiary:#f5f5f7; --bg-hover:#e8e8ed;
      --text-primary:#1d1d1f; --text-secondary:#86868b; --text-tertiary:#aeaeb2;
      --border-color:#e8e8ed; --border-light:#f0f0f5;
      --accent-color:#FEE500; --accent-hover:#f5da00;
      --danger-bg:#fff1f0; --danger-text:#cf1322;
      --card-bg:#ffffff; --modal-overlay:rgba(0,0,0,0.4);
      --toast-bg:#1d1d1f; --toast-text:#ffffff;
      --input-bg:#ffffff; --scrollbar-thumb:#d2d2d7; --column-bg:#ffffff;
      --label-feature-bg:#e5f0ff; --label-feature-text:#0066cc;
      --label-done-bg:#e5ffe5; --label-done-text:#008800;
      --label-urgent-bg:#ffe5e5; --label-urgent-text:#cc0000;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    .dark-mode {
      --bg-primary:#000000; --bg-secondary:#0a0a0a; --bg-tertiary:#141414; --bg-hover:#1f1f1f;
      --text-primary:#f5f5f7; --text-secondary:#8e8e93; --text-tertiary:#636366;
      --border-color:#1c1c1e; --border-light:#141414;
      --card-bg:#0a0a0a; --modal-overlay:rgba(0,0,0,0.85);
      --toast-bg:#f5f5f7; --toast-text:#000000;
      --input-bg:#141414; --scrollbar-thumb:#2c2c2e; --column-bg:#0a0a0a;
      --label-feature-bg:#0a1a2e; --label-feature-text:#64b5f6;
      --label-done-bg:#0a1a0a; --label-done-text:#81c784;
      --label-urgent-bg:#1a0a0a; --label-urgent-text:#ef5350;
      --danger-bg:#1a0a0a; --danger-text:#ef5350;
    }
    body {
      background:#000; font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI','Helvetica Neue',sans-serif;
      height:100dvh; width:100dvw; overflow:hidden; color:var(--text-primary);
      display:flex; flex-direction:column; transition:background 0.3s,color 0.3s;
      -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
      padding-bottom:var(--safe-bottom);
    }
    .kanban-app {
      display:flex; flex-direction:column; height:100dvh; width:100dvw;
      background:var(--bg-primary); overflow:hidden; transition:background 0.3s;
    }
    .app-header {
      padding:0 14px; height:50px; background:var(--bg-primary);
      border-bottom:0.5px solid var(--border-color); display:flex; align-items:center;
      justify-content:space-between; flex-shrink:0; min-height:50px; gap:6px;
      transition:background 0.3s,border-color 0.3s; padding-top:env(safe-area-inset-top,0px);
    }
    .header-left { display:flex; align-items:center; gap:6px; flex-shrink:0; min-width:0; }
    .app-title { font-size:1.15rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.3px; white-space:nowrap; }
    .version-tag { font-size:0.65rem; color:var(--text-tertiary); font-weight:400; }
    .header-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .header-btn {
      background:none; border:none; font-size:1.15rem; color:var(--text-primary);
      cursor:pointer; padding:8px; border-radius:50%; transition:background 0.15s;
      flex-shrink:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center; position:relative;
    }
    .header-btn:active { background:var(--bg-tertiary); transform:scale(0.95); }
    .notification-dot { position:absolute; top:6px; right:6px; width:6px; height:6px; background:#FF3B30; border-radius:50%; }
    .avatar-btn {
      width:32px; height:32px; border-radius:50%; background:var(--accent-color);
      display:flex; align-items:center; justify-content:center; font-size:0.75rem;
      font-weight:700; cursor:pointer; border:none; overflow:hidden; flex-shrink:0;
      padding:0; transition:transform 0.15s; color:#000; margin-left:2px;
    }
    .avatar-btn:active { transform:scale(0.95); }
    .avatar-btn img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .toolbar {
      padding:6px 14px; background:var(--bg-primary); border-bottom:0.5px solid var(--border-color);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
      gap:8px; min-height:40px; transition:background 0.3s,border-color 0.3s;
    }
    .view-tabs { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; align-items:center; flex:1; min-width:0; }
    .view-tabs::-webkit-scrollbar { display:none; }
    .view-tab {
      padding:5px 10px; border-radius:14px; font-size:0.78rem; font-weight:600;
      cursor:pointer; border:none; background:none; color:var(--text-secondary);
      transition:all 0.2s; font-family:inherit; white-space:nowrap; letter-spacing:-0.2px;
    }
    .view-tab.active { background:var(--accent-color); color:#000; font-weight:700; }
    .view-tab .count { font-size:0.7rem; margin-left:2px; opacity:0.7; }
    .toolbar-actions { display:flex; gap:2px; align-items:center; flex-shrink:0; }
    .btn {
      padding:5px 8px; border-radius:14px; font-size:0.75rem; font-weight:600;
      cursor:pointer; border:none; font-family:inherit; transition:all 0.15s;
      display:flex; align-items:center; gap:3px; white-space:nowrap; letter-spacing:-0.2px;
      background:none; color:var(--text-secondary);
    }
    .btn:active { transform:scale(0.95); background:var(--bg-tertiary); }
    .btn-primary { background:var(--accent-color); color:#000; font-weight:700; }
    .btn-primary:active { background:var(--accent-hover); }
    .btn-danger { color:#FF3B30; }
    .board-container {
      flex:1; overflow-x:auto; overflow-y:auto; padding:12px; display:flex; gap:12px;
      background:var(--bg-secondary); min-height:0; -webkit-overflow-scrolling:touch; transition:background 0.3s;
    }
    .column {
      min-width:260px; max-width:360px; flex:1 0 auto; background:var(--column-bg);
      border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:8px;
      border:0.5px solid var(--border-color); transition:border-color 0.2s,background 0.3s; height:fit-content; max-height:100%;
    }
    .column.drag-over { border-color:var(--accent-color); }
    .column-header { display:flex; align-items:center; justify-content:space-between; padding:0 2px 4px; flex-shrink:0; }
    .column-title-group { display:flex; align-items:center; gap:6px; min-width:0; }
    .column-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .column-name { font-weight:700; font-size:0.85rem; color:var(--text-primary); white-space:nowrap; letter-spacing:-0.2px; }
    .column-count { font-size:0.7rem; color:var(--text-tertiary); font-weight:500; }
    .column-actions { display:flex; gap:1px; }
    .column-action-btn {
      background:none; border:none; color:var(--text-tertiary); cursor:pointer;
      padding:4px 6px; border-radius:50%; font-size:0.8rem; transition:all 0.15s;
      flex-shrink:0; width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    }
    .column-action-btn:active { background:var(--bg-tertiary); color:var(--text-primary); }
    .card-list { display:flex; flex-direction:column; gap:6px; overflow-y:auto; flex:1; min-height:0; padding-right:2px; max-height:calc(100dvh - 240px); }
    .task-card {
      background:var(--card-bg); border-radius:10px; padding:10px 12px;
      border:0.5px solid var(--border-color); cursor:pointer; transition:all 0.15s ease;
      display:flex; flex-direction:column; gap:6px; user-select:none; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .task-card:active { transform:scale(0.98); background:var(--bg-tertiary); }
    .task-card.hidden { display:none; }
    .task-card.dragging { opacity:0.3; transform:scale(0.95); }
    .card-labels { display:flex; gap:3px; flex-wrap:wrap; }
    .label { padding:2px 6px; border-radius:8px; font-size:0.6rem; font-weight:700; letter-spacing:-0.1px; }
    .label.urgent { background:var(--label-urgent-bg); color:var(--label-urgent-text); }
    .label.feature { background:var(--label-feature-bg); color:var(--label-feature-text); }
    .label.done { background:var(--label-done-bg); color:var(--label-done-text); }
    .card-title { font-weight:600; font-size:0.82rem; color:var(--text-primary); line-height:1.35; display:flex; align-items:flex-start; gap:5px; letter-spacing:-0.2px; }
    .card-title i { color:var(--accent-color); margin-top:2px; flex-shrink:0; font-size:0.7rem; }
    .card-description { font-size:0.72rem; color:var(--text-secondary); line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-meta { display:flex; align-items:center; justify-content:space-between; font-size:0.65rem; color:var(--text-tertiary); flex-wrap:wrap; gap:4px; }
    .card-assignee { display:flex; align-items:center; gap:3px; }
    .card-assignee-avatar {
      width:16px; height:16px; border-radius:50%; background:var(--accent-color);
      display:flex; align-items:center; justify-content:center; font-size:0.55rem;
      font-weight:700; color:#000; flex-shrink:0; overflow:hidden;
    }
    .card-assignee-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .card-date { display:flex; align-items:center; gap:2px; }
    .card-actions-row { display:flex; gap:3px; margin-top:2px; }
    .card-move-btn {
      flex:1; padding:4px 5px; border:0.5px solid var(--border-color);
      background:var(--bg-tertiary); border-radius:6px; font-size:0.6rem;
      cursor:pointer; transition:all 0.15s; color:var(--text-secondary);
      font-family:inherit; text-align:center; -webkit-tap-highlight-color:transparent;
    }
    .card-move-btn:active { background:var(--accent-color); border-color:var(--accent-color); color:#000; }
    .empty-column-message { text-align:center; padding:20px 10px; color:var(--text-tertiary); font-size:0.75rem; display:none; letter-spacing:-0.2px; }
    .empty-column-message i { font-size:1.3rem; display:block; margin-bottom:4px; opacity:0.5; }
    .add-column-btn {
      min-width:260px; max-width:360px; flex:1 0 auto; background:none;
      border:1px dashed var(--border-color); border-radius:14px; padding:20px;
      display:flex; align-items:center; justify-content:center; gap:5px; cursor:pointer;
      color:var(--text-tertiary); font-weight:600; font-size:0.82rem; transition:all 0.2s;
      height:fit-content; font-family:inherit; letter-spacing:-0.2px;
    }
    .add-column-btn:active { border-color:var(--accent-color); color:var(--accent-color); }
    .modal-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:var(--modal-overlay); z-index:1000; display:none; align-items:flex-end; justify-content:center;
    }
    .modal-overlay.active { display:flex; }
    .modal-sheet {
      background:var(--bg-primary); border-radius:16px 16px 0 0; width:100%; max-width:500px;
      max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease; transition:background 0.3s;
      padding-bottom:var(--safe-bottom);
    }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .modal-header { padding:14px 18px; border-bottom:0.5px solid var(--border-color); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-weight:700; font-size:1rem; color:var(--text-primary); letter-spacing:-0.2px; }
    .modal-close { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--text-secondary); padding:6px; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
    .modal-close:active { background:var(--bg-tertiary); }
    .modal-body { padding:14px 18px; }
    .form-group { margin-bottom:12px; }
    .form-label { display:block; font-size:0.75rem; font-weight:600; color:var(--text-secondary); margin-bottom:4px; letter-spacing:-0.2px; }
    .form-input,.form-textarea,.form-select {
      width:100%; padding:10px 12px; border:0.5px solid var(--border-color); border-radius:8px;
      font-size:0.85rem; font-family:inherit; outline:none; transition:border 0.2s;
      background:var(--input-bg); color:var(--text-primary); letter-spacing:-0.2px;
    }
    .form-input:focus,.form-textarea:focus,.form-select:focus { border-color:var(--accent-color); }
    .form-textarea { resize:vertical; min-height:50px; }
    .modal-footer { padding:10px 18px 14px; border-top:0.5px solid var(--border-color); display:flex; gap:8px; }
    .search-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary);
      z-index:1001; display:none; flex-direction:column; padding:0 14px;
      padding-top:env(safe-area-inset-top,0px); padding-bottom:var(--safe-bottom);
    }
    .search-overlay.active { display:flex; }
    .search-header { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:0.5px solid var(--border-color); flex-shrink:0; }
    .search-back { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-primary); padding:8px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
    .search-input-field { flex:1; padding:10px 12px; border:none; border-radius:8px; font-size:0.95rem; font-family:inherit; outline:none; background:var(--bg-tertiary); color:var(--text-primary); }
    .search-results { flex:1; overflow-y:auto; padding:10px 0; display:flex; flex-direction:column; gap:6px; }
    .search-result-item { padding:12px 14px; background:var(--bg-tertiary); border-radius:10px; cursor:pointer; border:0.5px solid transparent; }
    .search-result-item:active { border-color:var(--accent-color); }
    .search-result-title { font-weight:600; font-size:0.85rem; color:var(--text-primary); }
    .search-result-meta { font-size:0.7rem; color:var(--text-tertiary); margin-top:3px; }
    .search-empty { text-align:center; color:var(--text-tertiary); padding:40px 20px; font-size:0.85rem; }
    .add-task-popup {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:var(--modal-overlay); z-index:1001; display:none; align-items:flex-end; justify-content:center;
    }
    .add-task-popup.active { display:flex; }
    .add-task-sheet {
      background:var(--bg-primary); border-radius:16px 16px 0 0; width:100%; max-width:500px;
      padding:6px 0 16px; animation:slideUp 0.25s ease; padding-bottom:var(--safe-bottom);
    }
    .sheet-handle { width:32px; height:4px; background:var(--border-color); border-radius:2px; margin:8px auto 10px; }
    .sheet-header { padding:0 18px 10px; border-bottom:0.5px solid var(--border-color); display:flex; align-items:center; justify-content:space-between; }
    .sheet-title { font-weight:700; font-size:1rem; color:var(--text-primary); }
    .sheet-close { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--text-secondary); padding:6px; border-radius:50%; }
    .sheet-body { padding:12px 18px; }
    .quick-add-input { width:100%; padding:12px 14px; border:0.5px solid var(--border-color); border-radius:10px; font-size:0.9rem; font-family:inherit; outline:none; margin-bottom:8px; background:var(--input-bg); color:var(--text-primary); }
    .quick-add-input:focus { border-color:var(--accent-color); }
    .quick-add-select { width:100%; padding:10px 12px; border:0.5px solid var(--border-color); border-radius:10px; font-size:0.85rem; font-family:inherit; outline:none; background:var(--input-bg); color:var(--text-primary); }
    .sheet-actions { display:flex; gap:8px; padding:8px 18px 0; }
    .profile-pic-section { display:flex; align-items:center; gap:14px; margin-bottom:14px; padding:12px; background:var(--bg-tertiary); border-radius:12px; }
    .profile-pic-large { width:56px; height:56px; border-radius:50%; background:var(--accent-color); display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:700; overflow:hidden; flex-shrink:0; color:#000; }
    .profile-pic-large img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .profile-pic-actions { display:flex; flex-direction:column; gap:5px; }
    .settings-section { margin-bottom:14px; }
    .settings-section h4 { font-size:0.8rem; font-weight:700; margin-bottom:6px; color:var(--text-primary); }
    .color-options { display:flex; gap:6px; flex-wrap:wrap; }
    .color-dot { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.15s; }
    .color-dot:active { transform:scale(1.1); }
    .color-dot.active { border-color:var(--text-primary); }
    .share-link-box { display:flex; gap:6px; align-items:center; background:var(--bg-tertiary); padding:8px 12px; border-radius:8px; margin-top:6px; }
    .share-link-box input { flex:1; border:none; background:none; font-size:0.75rem; color:var(--text-primary); font-family:monospace; outline:none; }
    .dev-section { background:var(--bg-tertiary); border-radius:12px; padding:14px; margin-top:4px; }
    .dev-section h4 { font-size:0.8rem; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
    .dev-info { font-size:0.7rem; color:var(--text-tertiary); margin-bottom:8px; line-height:1.4; }
    .dev-badge { display:inline-block; background:#AF52DE; color:#fff; padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:700; margin-left:6px; }
    .toast-notification {
      position:fixed; bottom:calc(50px + var(--safe-bottom)); left:50%; transform:translateX(-50%);
      background:var(--toast-bg); color:var(--toast-text); padding:10px 20px; border-radius:20px;
      font-size:0.8rem; font-weight:600; z-index:2000; opacity:0; transition:opacity 0.3s;
      pointer-events:none; white-space:nowrap; letter-spacing:-0.2px; display:flex; align-items:center; gap:8px;
    }
    .toast-notification.show { opacity:1; }
    .toast-undo { background:var(--accent-color); color:#000; border:none; padding:4px 10px; border-radius:12px; font-weight:700; cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .card-list::-webkit-scrollbar { width:2px; } .card-list::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:2px; }
    .board-container::-webkit-scrollbar { height:2px; } .board-container::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:2px; }
    @media(max-width:768px) {
      .app-header { padding:0 10px; height:46px; min-height:46px; }
      .app-title { font-size:1.05rem; }
      .toolbar { padding:4px 10px; min-height:36px; }
      .view-tab { padding:4px 8px; font-size:0.72rem; }
      .board-container { flex-direction:column; padding:8px; gap:10px; }
      .column,.add-column-btn { min-width:100%; max-width:100%; flex:0 0 auto; max-height:none; }
      .card-list { max-height:35vh; }
      .card-actions-row { display:flex!important; }
    }
  </style>
</head>
<body>
  <div class="kanban-app">
    <header class="app-header">
      <div class="header-left">
        <span class="app-title">Kanban</span>
        <span class="version-tag">v1.3.1</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="searchBtn" title="Search"><i class="fas fa-search"></i></button>
        <button class="header-btn" id="notificationsBtn" title="Notifications"><i class="far fa-bell"></i><span class="notification-dot"></span></button>
        <button class="header-btn" id="settingsBtn" title="Settings"><i class="fas fa-cog"></i></button>
        <button class="avatar-btn" id="profileBtn" title="Profile">
          <img id="headerAvatar" src="" alt="Profile" style="display:none;">
          <span id="headerAvatarText">ME</span>
        </button>
      </div>
    </header>

    <div class="toolbar">
      <div class="view-tabs" id="viewTabs">
        <button class="view-tab active" data-filter="all"><span data-ko="전체" data-en="All">전체</span> <span class="count">0</span></button>

  <script>
(function(){
  const STORAGE_KEY='kanban_v131';
  const DEFAULT_COLUMNS=[{id:'todo',name:{ko:'할 일',en:'To Do'},color:'#FEE500'},{id:'inprogress',name:{ko:'진행중',en:'In Progress'},color:'#007AFF'},{id:'done',name:{ko:'완료',en:'Done'},color:'#34C759'}];
  let taskIdCounter=1,currentFilter='all',editingCard=null,currentLang='ko',isDarkMode=true,accentColor='#FEE500';
  let profileData={name:'ME',photo:null},columns=JSON.parse(JSON.stringify(DEFAULT_COLUMNS)),selectedColumnColor='#FEE500';
  let undoStack=[],webrtcPeer=null,webrtcDataChannel=null;

  const boardContainer=document.getElementById('boardContainer'),taskModal=document.getElementById('taskModal');
  const addTaskPopup=document.getElementById('addTaskPopup'),settingsModal=document.getElementById('settingsModal');
  const profileModal=document.getElementById('profileModal'),addColumnModal=document.getElementById('addColumnModal');
  const searchOverlay=document.getElementById('searchOverlay'),toast=document.getElementById('appToast');

  const t=(k)=>{const tr={taskSaved:{ko:'저장됨',en:'Saved'},taskDeleted:{ko:'삭제됨',en:'Deleted'},taskAdded:{ko:'추가됨',en:'Added'},enterTitle:{ko:'제목을 입력하세요',en:'Enter title'},confirmDelete:{ko:'삭제하시겠습니까?',en:'Delete?'},confirmReset:{ko:'초기화하시겠습니까?',en:'Reset board?'},confirmDeleteColumn:{ko:'리스트를 삭제하시겠습니까?',en:'Delete list?'},boardReset:{ko:'초기화됨',en:'Reset'},noData:{ko:'데이터 없음',en:'No data'},importDone:{ko:'가져오기 완료',en:'Imported'},invalidFile:{ko:'잘못된 파일',en:'Invalid file'},profileSaved:{ko:'저장됨',en:'Saved'},photoRemoved:{ko:'제거됨',en:'Removed'},linkCopied:{ko:'복사됨',en:'Copied'},shareGenerated:{ko:'링크 생성됨',en:'Link generated'},columnAdded:{ko:'리스트 추가됨',en:'List added'},columnDeleted:{ko:'삭제됨',en:'Deleted'},enterColumnName:{ko:'이름을 입력하세요',en:'Enter name'},peerConnected:{ko:'피어 연결됨! 실시간 동기화 중',en:'Peer connected! Syncing in real-time'},peerDisconnected:{ko:'피어 연결 해제됨',en:'Peer disconnected'},peerWaiting:{ko:'방 코드 공유 후 참가 대기 중...',en:'Share room code and wait for peer...'},peerConnecting:{ko:'연결 중...',en:'Connecting...'}};return tr[k]?.[currentLang]||k;};

  function updateUILanguage(){
    document.querySelectorAll('[data-ko][data-en]').forEach(el=>{if(el.tagName==='OPTION'||el.classList.contains('btn-text')||!el.closest('.btn'))el.textContent=el.getAttribute(`data-${currentLang}`)});
    document.querySelectorAll('[data-ko-placeholder][data-en-placeholder]').forEach(el=>el.placeholder=el.getAttribute(`data-${currentLang}-placeholder`));
    updateColumnNames();updateFilterTabs();updateStatusSelects();
  }
  function updateColumnNames(){document.querySelectorAll('.column').forEach(col=>{const cd=columns.find(c=>c.id===col.dataset.status);if(cd){const n=col.querySelector('.column-name');if(n)n.textContent=cd.name[currentLang]}})}
  function updateFilterTabs(){
    const tc=document.getElementById('viewTabs');tc.querySelectorAll('.view-tab').forEach(t=>{const f=t.dataset.filter;if(f!=='all'&&!DEFAULT_COLUMNS.find(c=>c.id===f))t.remove()});
    columns.forEach(col=>{if(!DEFAULT_COLUMNS.find(c=>c.id===col.id)&&!tc.querySelector(`[data-filter="${col.id}"]`)){const tab=document.createElement('button');tab.className='view-tab';tab.dataset.filter=col.id;tab.innerHTML=`${col.name[currentLang]} <span class="count">0</span>`;tc.appendChild(tab)}});
  }
  function updateStatusSelects(){[document.getElementById('editStatus'),document.getElementById('quickTaskStatus')].forEach(sel=>{if(!sel)return;const v=sel.value;sel.innerHTML=columns.map(c=>`<option value="${c.id}">${c.name[currentLang]}</option>`).join('');if(columns.find(c=>c.id===v))sel.value=v})}
  function updateAccentColor(c){accentColor=c;document.documentElement.style.setProperty('--accent-color',c);document.querySelectorAll('#accentColors .color-dot').forEach(d=>d.classList.toggle('active',d.dataset.color===c));saveAllData()}
  function applyTheme(){document.body.classList.toggle('dark-mode',isDarkMode);document.querySelector('meta[name="theme-color"]').content=isDarkMode?'#000000':'#ffffff';saveAllData()}
  function updateProfileUI(){
    const ha=document.getElementById('headerAvatar'),hat=document.getElementById('headerAvatarText'),pi=document.getElementById('profilePicImg'),pt=document.getElementById('profilePicText');
    if(profileData.photo){ha.src=profileData.photo;ha.style.display='block';hat.style.display='none';pi.src=profileData.photo;pi.style.display='block';pt.style.display='none'}
    else{ha.style.display='none';hat.style.display='block';hat.textContent=profileData.name.charAt(0).toUpperCase();pi.style.display='none';pt.style.display='block';pt.textContent=profileData.name.charAt(0).toUpperCase()}
    document.getElementById('profileName').value=profileData.name;
  }
  function showToast(msg,undoAction=null){
    toast.innerHTML=msg;if(undoAction){const b=document.createElement('button');b.className='toast-undo';b.textContent=currentLang==='ko'?'실행 취소':'Undo';b.addEventListener('click',()=>{undoAction();toast.classList.remove('show')});toast.appendChild(b)}
    toast.classList.add('show');clearTimeout(toast._hideTimer);toast._hideTimer=setTimeout(()=>toast.classList.remove('show'),undoAction?4000:1800);
  }
  function getCardTitle(card){const t=card.querySelector('.card-title');if(!t)return'';const c=t.cloneNode(true);const i=c.querySelector('i');if(i)i.remove();return c.textContent.trim()}
  function updateColumnCounts(){
    columns.forEach(col=>{const ce=document.querySelector(`.column[data-status="${col.id}"]`);if(ce){const cnt=ce.querySelectorAll('.task-card').length;const cs=ce.querySelector('.column-count');if(cs)cs.textContent=cnt;const em=ce.querySelector('.empty-column-message');if(em)em.style.display=cnt===0?'block':'none'}});
    const total=document.querySelectorAll('.task-card').length;const ac=document.querySelector('[data-filter="all"] .count');if(ac)ac.textContent=total;
    columns.forEach(col=>{const tc=document.querySelector(`[data-filter="${col.id}"] .count`);if(tc)tc.textContent=document.querySelectorAll(`.column[data-status="${col.id}"] .task-card`).length});
  }
  function applyFilter(filter){currentFilter=filter;document.querySelectorAll('.task-card').forEach(c=>c.classList.toggle('hidden',filter!=='all'&&c.dataset.status!==filter))}
  function moveCard(card,newStatus){
    const tl=document.querySelector(`.column[data-status="${newStatus}"] .card-list`);if(!tl||!card)return;
    const oldStatus=card.dataset.status,oldParent=card.parentNode;
    card.dataset.status=newStatus;updateCardMoveButtons(card);
    const label=card.querySelector('.label');if(label){const cd=columns.find(c=>c.id===newStatus);label.className='label '+(cd&&cd.id==='done'?'done':'feature');label.textContent=cd&&cd.id==='done'?(currentLang==='ko'?'완료':'Done'):(currentLang==='ko'?'기능':'Feature')}
    tl.appendChild(card);updateColumnCounts();saveAllData();applyFilter(currentFilter);
    syncToPeer();
  }
  function updateCardMoveButtons(card){
    const ar=card.querySelector('.card-actions-row');if(!ar)return;const cs=card.dataset.status,ci=columns.findIndex(c=>c.id===cs);
    ar.innerHTML=columns.filter(c=>c.id!==cs).map(c=>{const arrow=columns.findIndex(col=>col.id===c.id)>ci?'→':'←';return `<button class="card-move-btn" data-move="${c.id}">${arrow} ${c.name[currentLang]}</button>`}).join('');
    ar.querySelectorAll('.card-move-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();moveCard(card,b.dataset.move)}));
  }
  function createCardElement(title,status,desc='',assignee='',dateStr=null){
    if(!dateStr){const d=new Date();dateStr=`${d.getMonth()+1}/${d.getDate()}`}if(!assignee)assignee=profileData.name||'ME';
    const id=taskIdCounter++;const card=document.createElement('div');card.className='task-card';card.dataset.status=status;card.dataset.id=id;card.draggable=true;
    const cd=columns.find(c=>c.id===status);const labelCls=cd&&cd.id==='done'?'done':'feature';const labelTxt=cd&&cd.id==='done'?(currentLang==='ko'?'완료':'Done'):(currentLang==='ko'?'기능':'Feature');
    const av=profileData.photo?`<img src="${profileData.photo}" alt="${assignee}">`:assignee.charAt(0).toUpperCase();
    card.innerHTML=`<div class="card-labels"><span class="label ${labelCls}">${labelTxt}</span></div><div class="card-title"><i class="far fa-sticky-note"></i> ${escapeHTML(title)}</div><div class="card-description">${escapeHTML(desc||(currentLang==='ko'?'설명 없음':'No description'))}</div><div class="card-meta"><div class="card-assignee"><span class="card-assignee-avatar">${av}</span> ${escapeHTML(assignee)}</div><div class="card-date"><i class="far fa-calendar-alt"></i> ${dateStr}</div></div><div class="card-actions-row"></div>`;
    updateCardMoveButtons(card);return card;
  }
  function escapeHTML(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function attachCardEvents(card){
    card.addEventListener('click',e=>{if(!e.target.closest('.card-move-btn'))openEditModal(card)});
    card.addEventListener('dragstart',e=>{card.classList.add('dragging');e.dataTransfer.setData('text/plain',card.dataset.id)});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    let startX=0,startY=0;
    card.addEventListener('touchstart',e=>{if(e.target.closest('.card-move-btn'))return;startX=e.touches[0].clientX;startY=e.touches[0].clientY});
    card.addEventListener('touchend',e=>{if(e.target.closest('.card-move-btn'))return;const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)){const ci=columns.findIndex(c=>c.id===card.dataset.status);const target=dx>0?columns[Math.min(ci+1,columns.length-1)]:columns[Math.max(ci-1,0)];if(target&&target.id!==card.dataset.status)moveCard(card,target.id)}else if(Math.abs(dx)<10&&Math.abs(dy)<10)openEditModal(card)});
  }
  function openEditModal(card){editingCard=card;document.getElementById('modalTitle').textContent=currentLang==='ko'?'작업 상세':'Task Details';document.getElementById('editTitle').value=getCardTitle(card);document.getElementById('editDesc').value=card.querySelector('.card-description')?.textContent||'';document.getElementById('editAssignee').value=card.querySelector('.card-assignee')?.textContent.trim()||profileData.name;updateStatusSelects();document.getElementById('editStatus').value=card.dataset.status;taskModal.classList.add('active');document.getElementById('editTitle').focus()}
  function closeEditModal(){taskModal.classList.remove('active');editingCard=null}
  function saveTaskChanges(){
    if(!editingCard)return;const title=document.getElementById('editTitle').value.trim();if(!title){showToast(t('enterTitle'));return}
    const desc=document.getElementById('editDesc').value.trim(),assignee=document.getElementById('editAssignee').value.trim()||profileData.name,newStatus=document.getElementById('editStatus').value;
    editingCard.querySelector('.card-title').innerHTML=`<i class="far fa-sticky-note"></i> ${escapeHTML(title)}`;
    editingCard.querySelector('.card-description').textContent=desc||(currentLang==='ko'?'설명 없음':'No description');
    const av=profileData.photo?`<img src="${profileData.photo}" alt="${assignee}">`:assignee.charAt(0).toUpperCase();
    const ae=editingCard.querySelector('.card-assignee');if(ae)ae.innerHTML=`<span class="card-assignee-avatar">${av}</span> ${escapeHTML(assignee)}`;
    if(editingCard.dataset.status!==newStatus)moveCard(editingCard,newStatus);
    updateColumnCounts();saveAllData();closeEditModal();showToast(t('taskSaved'));syncToPeer();
  }
  function deleteTask(){
    if(!editingCard||!confirm(t('confirmDelete')))return;
    const card=editingCard,parent=card.parentNode,status=card.dataset.status,title=getCardTitle(card),desc=card.querySelector('.card-description')?.textContent||'',assignee=card.querySelector('.card-assignee')?.textContent.trim()||'';
    card.remove();updateColumnCounts();saveAllData();closeEditModal();
    showToast(t('taskDeleted'),()=>{const c=createCardElement(title,status,desc,assignee);c.dataset.id=card.dataset.id;parent.appendChild(c);attachCardEvents(c);updateColumnCounts();saveAllData();applyFilter(currentFilter);showToast(currentLang==='ko'?'복구됨':'Restored');syncToPeer()});
    syncToPeer();
  }
  function openAddPopup(preset=null){quickTaskTitle.value='';updateStatusSelects();if(preset&&columns.find(c=>c.id===preset))quickTaskStatus.value=preset;addTaskPopup.classList.add('active');setTimeout(()=>quickTaskTitle.focus(),100)}
  function closeAddPopup(){addTaskPopup.classList.remove('active')}
  function addTaskFromPopup(){
    const title=quickTaskTitle.value.trim();if(!title){showToast(t('enterTitle'));return}
    const status=quickTaskStatus.value,card=createCardElement(title,status);
    const list=document.querySelector(`.column[data-status="${status}"] .card-list`);
    if(list){list.appendChild(card);attachCardEvents(card);updateColumnCounts();if(currentFilter!=='all'&&currentFilter!==status)card.classList.add('hidden');saveAllData();showToast(t('taskAdded'))}
    closeAddPopup();syncToPeer();
  }
  function renderAllColumns(){
    boardContainer.innerHTML='';
    columns.forEach(col=>{const el=document.createElement('div');el.className='column';el.dataset.status=col.id;el.innerHTML=`<div class="column-header"><div class="column-title-group"><span class="column-dot" style="background:${col.color}"></span><span class="column-name">${col.name[currentLang]}</span><span class="column-count">0</span></div><div class="column-actions"><button class="column-action-btn column-add-btn" data-add-to="${col.id}"><i class="fas fa-plus"></i></button>${!DEFAULT_COLUMNS.find(c=>c.id===col.id)?`<button class="column-action-btn delete-column" data-delete="${col.id}"><i class="fas fa-trash-alt"></i></button>`:''}</div></div><div class="card-list"></div><div class="empty-column-message"><span data-ko="비어있음" data-en="Empty">비어있음</span></div>`;boardContainer.appendChild(el)});
    const addBtn=document.createElement('button');addBtn.className='add-column-btn';addBtn.id='addColumnTrigger';addBtn.innerHTML=`<i class="fas fa-plus"></i> <span data-ko="리스트 추가" data-en="Add List">리스트 추가</span>`;boardContainer.appendChild(addBtn);
    attachColumnEvents();updateUILanguage();
  }
  function attachColumnEvents(){
    document.querySelectorAll('.column-add-btn').forEach(b=>b.addEventListener('click',()=>openAddPopup(b.dataset.addTo)));
    document.querySelectorAll('.delete-column').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();deleteColumn(b.dataset.delete)}));
    document.querySelectorAll('.column').forEach(col=>{col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over')});col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');const dc=document.querySelector('.task-card.dragging');if(dc)moveCard(dc,col.dataset.status)})});
    const at=document.getElementById('addColumnTrigger');if(at)at.addEventListener('click',()=>addColumnModal.classList.add('active'));
  }
  function addNewColumn(){
    const name=document.getElementById('newColumnName').value.trim();if(!name){showToast(t('enterColumnName'));return}
    columns.push({id:'col_'+Date.now(),name:{ko:name,en:name},color:selectedColumnColor});
    renderAllColumns();updateFilterTabs();updateStatusSelects();saveAllData();addColumnModal.classList.remove('active');document.getElementById('newColumnName').value='';showToast(t('columnAdded'));
  }
  function deleteColumn(cid){if(!confirm(t('confirmDeleteColumn')))return;columns=columns.filter(c=>c.id!==cid);document.querySelectorAll(`.column[data-status="${cid}"] .task-card`).forEach(c=>c.remove());renderAllColumns();updateFilterTabs();updateStatusSelects();saveAllData();showToast(t('columnDeleted'))}

  // WebRTC
  function generateRoomCode(){return Math.random().toString(36).substring(2,8).toUpperCase()}
  function toggleWebRTCPanel(){const p=document.getElementById('webrtcPanel');p.style.display=p.style.display==='none'?'block':'none'}
  async function hostWebRTC(){
    const statusEl=document.getElementById('webrtcStatus');const code=generateRoomCode();document.getElementById('webrtcRoomCode').value=code;
    const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});webrtcPeer=pc;
    const channel=pc.createDataChannel('kanban-sync');setupDataChannel(channel);
    pc.onicecandidate=e=>{if(e.candidate){/* ICE candidate ready */}};
    const offer=await pc.createOffer();await pc.setLocalDescription(offer);
    window._pendingOffer=pc.localDescription;
    statusEl.textContent=t('peerWaiting');
  }
  async function joinWebRTC(){
    const statusEl=document.getElementById('webrtcStatus');const code=document.getElementById('webrtcRoomCode').value.trim();if(!code)return;
    if(!window._pendingOffer){statusEl.textContent=currentLang==='ko'?'호스트가 먼저 방을 만들어야 합니다':'Host must create room first';return}
    const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});webrtcPeer=pc;
    pc.ondatachannel=e=>setupDataChannel(e.channel);
    pc.onicecandidate=e=>{if(e.candidate){/* ICE candidate ready */}};
    statusEl.textContent=t('peerConnecting');
    await pc.setRemoteDescription(window._pendingOffer);
    const answer=await pc.createAnswer();await pc.setLocalDescription(answer);
  }
  function setupDataChannel(channel){
    webrtcDataChannel=channel;
    channel.onopen=()=>{document.getElementById('webrtcStatus').textContent=t('peerConnected');syncToPeer()};
    channel.onmessage=e=>{try{const data=JSON.parse(e.data);if(data.type==='full-sync'){localStorage.setItem(STORAGE_KEY,JSON.stringify(data.boardData));loadAllData()}else if(data.type==='card-move'){const card=document.querySelector(`.task-card[data-id="${data.cardId}"]`);if(card)moveCard(card,data.newStatus)}else if(data.type==='card-delete'){const card=document.querySelector(`.task-card[data-id="${data.cardId}"]`);if(card){card.remove();updateColumnCounts()}}else if(data.type==='card-add'){const card=createCardElement(data.title,data.status,data.desc,data.assignee,data.date);card.dataset.id=data.cardId;const list=document.querySelector(`.column[data-status="${data.status}"] .card-list`);if(list){list.appendChild(card);attachCardEvents(card);updateColumnCounts()}}}catch(ex){}}
    channel.onclose=()=>{document.getElementById('webrtcStatus').textContent=t('peerDisconnected');webrtcDataChannel=null}
  }
  function syncToPeer(){
    if(!webrtcDataChannel||webrtcDataChannel.readyState!=='open')return;
    const data=localStorage.getItem(STORAGE_KEY);if(data)webrtcDataChannel.send(JSON.stringify({type:'full-sync',boardData:JSON.parse(data)}));
  }

  // Storage
  function saveAllData(){
    const tasks=[];document.querySelectorAll('.task-card').forEach(c=>{tasks.push({id:c.dataset.id,title:getCardTitle(c),desc:c.querySelector('.card-description')?.textContent||'',assignee:c.querySelector('.card-assignee')?.textContent.trim()||profileData.name,status:c.dataset.status,date:c.querySelector('.card-date')?.textContent.trim()||''})});
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({tasks,nextId:taskIdCounter,lang:currentLang,isDarkMode,accentColor,profile:profileData,columns}))}catch(e){}
  }
  function loadAllData(){
    const saved=localStorage.getItem(STORAGE_KEY);if(!saved){renderAllColumns();updateColumnCounts();updateProfileUI();updateFilterTabs();updateStatusSelects();return}
    try{const data=JSON.parse(saved);taskIdCounter=data.nextId||1;if(data.lang)currentLang=data.lang;if(data.isDarkMode!==undefined)isDarkMode=data.isDarkMode;if(data.accentColor)accentColor=data.accentColor;if(data.profile)profileData=data.profile;if(data.columns?.length)columns=data.columns;applyTheme();updateAccentColor(accentColor);updateProfileUI();renderAllColumns();updateFilterTabs();updateStatusSelects();updateUILanguage();
    document.querySelectorAll('.task-card').forEach(c=>c.remove());
    (data.tasks||[]).forEach(t=>{if(columns.find(c=>c.id===t.status)){const card=createCardElement(t.title,t.status,t.desc,t.assignee,t.date);card.dataset.id=t.id;const list=document.querySelector(`.column[data-status="${t.status}"] .card-list`);if(list){list.appendChild(card);attachCardEvents(card)}}});
    taskIdCounter=Math.max(taskIdCounter,Math.max(...(data.tasks||[]).map(t=>parseInt(t.id)||0),0)+1);updateColumnCounts()}catch(e){renderAllColumns();updateColumnCounts()}
  }
  function exportBoard(){const d=localStorage.getItem(STORAGE_KEY);if(!d)return showToast(t('noData'));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download='kanban_backup.json';a.click()}
  function importBoard(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.tasks){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));loadAllData();showToast(t('importDone'))}}catch(ex){showToast(t('invalidFile'))}};r.readAsText(f)};inp.click()}
  function resetBoard(){if(!confirm(t('confirmReset')))return;localStorage.removeItem(STORAGE_KEY);columns=JSON.parse(JSON.stringify(DEFAULT_COLUMNS));document.querySelectorAll('.task-card').forEach(c=>c.remove());taskIdCounter=1;renderAllColumns();updateFilterTabs();updateStatusSelects();updateColumnCounts();showToast(t('boardReset'))}
  function generateShareLink(){const d=localStorage.getItem(STORAGE_KEY);if(!d)return showToast(t('noData'));const link=`${location.origin}${location.pathname}?share=${btoa(encodeURIComponent(d))}`;document.getElementById('shareLinkInput').value=link;document.getElementById('shareLinkBox').style.display='flex';showToast(t('shareGenerated'))}
  function loadSharedBoard(){const p=new URLSearchParams(location.search).get('share');if(!p)return;try{const data=JSON.parse(decodeURIComponent(atob(p)));if(data.tasks){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));loadAllData()}}catch(e){}history.replaceState({},'',location.pathname)}

  // Search
  function openSearch(){searchOverlay.classList.add('active');document.getElementById('searchOverlayInput').focus();updateSearchResults('')}
  function closeSearch(){searchOverlay.classList.remove('active');document.getElementById('searchOverlayInput').value='';document.getElementById('searchResults').innerHTML=`<div class="search-empty"><span data-ko="검색어를 입력하세요" data-en="Type to search">검색어를 입력하세요</span></div>`}
  function updateSearchResults(term){
    const sr=document.getElementById('searchResults');if(!term){sr.innerHTML=`<div class="search-empty"><span data-ko="검색어를 입력하세요" data-en="Type to search">검색어를 입력하세요</span></div>`;return}
    const results=[];document.querySelectorAll('.task-card').forEach(c=>{const title=getCardTitle(c).toLowerCase(),desc=(c.querySelector('.card-description')?.textContent||'').toLowerCase();if(title.includes(term)||desc.includes(term))results.push(c)});
    if(results.length===0)sr.innerHTML=`<div class="search-empty"><span data-ko="결과 없음" data-en="No results">결과 없음</span></div>`;
    else{sr.innerHTML=results.map(c=>{const cd=columns.find(col=>col.id===c.dataset.status);return`<div class="search-result-item" data-card-id="${c.dataset.id}"><div class="search-result-title">${escapeHTML(getCardTitle(c))}</div><div class="search-result-meta">${cd?cd.name[currentLang]:''} • ${c.querySelector('.card-assignee')?.textContent.trim()||''}</div></div>`}).join('');sr.querySelectorAll('.search-result-item').forEach(item=>item.addEventListener('click',()=>{const card=document.querySelector(`.task-card[data-id="${item.dataset.cardId}"]`);if(card){openEditModal(card);closeSearch()}}))}
  }

  // Event bindings
  document.getElementById('viewTabs').addEventListener('click',e=>{const tab=e.target.closest('.view-tab');if(!tab)return;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');applyFilter(tab.dataset.filter)});
  document.getElementById('modalClose').addEventListener('click',closeEditModal);taskModal.addEventListener('click',e=>{if(e.target===taskModal)closeEditModal()});
  document.getElementById('saveTaskBtn').addEventListener('click',saveTaskChanges);document.getElementById('deleteTaskBtn').addEventListener('click',deleteTask);
  document.getElementById('settingsBtn').addEventListener('click',()=>settingsModal.classList.add('active'));
  document.getElementById('settingsClose').addEventListener('click',()=>settingsModal.classList.remove('active'));
  settingsModal.addEventListener('click',e=>{if(e.target===settingsModal)settingsModal.classList.remove('active')});
  document.getElementById('lightModeBtn').addEventListener('click',()=>{isDarkMode=false;applyTheme()});
  document.getElementById('darkModeBtn').addEventListener('click',()=>{isDarkMode=true;applyTheme()});
  document.getElementById('accentColors').addEventListener('click',e=>{const d=e.target.closest('.color-dot');if(d)updateAccentColor(d.dataset.color)});
  document.getElementById('generateShareLink').addEventListener('click',generateShareLink);
  document.getElementById('copyShareLink').addEventListener('click',()=>{navigator.clipboard.writeText(document.getElementById('shareLinkInput').value);showToast(t('linkCopied'))});
  document.getElementById('langToggleBtn').addEventListener('click',()=>{currentLang=currentLang==='ko'?'en':'ko';updateUILanguage();saveAllData()});
  document.getElementById('settingsExport').addEventListener('click',exportBoard);
  document.getElementById('settingsImport').addEventListener('click',importBoard);
  document.getElementById('settingsReset').addEventListener('click',resetBoard);
  document.getElementById('webrtcToggleBtn').addEventListener('click',toggleWebRTCPanel);
  document.getElementById('webrtcHostBtn').addEventListener('click',hostWebRTC);
  document.getElementById('webrtcJoinBtn').addEventListener('click',joinWebRTC);
  document.getElementById('profileBtn').addEventListener('click',()=>{updateProfileUI();profileModal.classList.add('active')});
  document.getElementById('profileClose').addEventListener('click',()=>profileModal.classList.remove('active'));
  profileModal.addEventListener('click',e=>{if(e.target===profileModal)profileModal.classList.remove('active')});
  document.getElementById('saveProfileBtn').addEventListener('click',()=>{profileData.name=document.getElementById('profileName').value.trim()||'ME';updateProfileUI();saveAllData();profileModal.classList.remove('active');showToast(t('profileSaved'))});
  document.getElementById('changePhotoBtn').addEventListener('click',()=>document.getElementById('photoInput').click());
  document.getElementById('removePhotoBtn').addEventListener('click',()=>{profileData.photo=null;updateProfileUI();saveAllData();showToast(t('photoRemoved'))});
  document.getElementById('photoInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{profileData.photo=ev.target.result;updateProfileUI();saveAllData();showToast(t('profileSaved'))};r.readAsDataURL(f)});
  document.getElementById('addColumnClose').addEventListener('click',()=>addColumnModal.classList.remove('active'));
  addColumnModal.addEventListener('click',e=>{if(e.target===addColumnModal)addColumnModal.classList.remove('active')});
  document.getElementById('addColumnConfirm').addEventListener('click',addNewColumn);
  document.getElementById('columnColors').addEventListener('click',e=>{const d=e.target.closest('.color-dot');if(!d)return;document.querySelectorAll('#columnColors .color-dot').forEach(dd=>dd.classList.remove('active'));d.classList.add('active');selectedColumnColor=d.dataset.color});
  document.getElementById('newColumnName').addEventListener('keypress',e=>{if(e.key==='Enter')addNewColumn()});
  document.getElementById('notificationsBtn').addEventListener('click',()=>showToast(currentLang==='ko'?'알림 없음':'No notifications'));
  document.getElementById('popupClose').addEventListener('click',closeAddPopup);document.getElementById('popupCancel').addEventListener('click',closeAddPopup);
  addTaskPopup.addEventListener('click',e=>{if(e.target===addTaskPopup)closeAddPopup()});
  document.getElementById('popupAdd').addEventListener('click',addTaskFromPopup);
  document.getElementById('quickTaskTitle').addEventListener('keypress',e=>{if(e.key==='Enter')addTaskFromPopup()});
  document.getElementById('globalAddBtn').addEventListener('click',()=>openAddPopup());
  document.getElementById('searchBtn').addEventListener('click',openSearch);
  document.getElementById('searchBack').addEventListener('click',closeSearch);
  document.getElementById('searchOverlayInput').addEventListener('input',e=>updateSearchResults(e.target.value.toLowerCase()));
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openAddPopup()}if(e.key==='Escape'){if(searchOverlay.classList.contains('active'))closeSearch();else if(addTaskPopup.classList.contains('active'))closeAddPopup();else if(taskModal.classList.contains('active'))closeEditModal();else{settingsModal.classList.remove('active');profileModal.classList.remove('active');addColumnModal.classList.remove('active')}}});

  loadAllData();loadSharedBoard();applyFilter('all');updateUILanguage();applyTheme();updateAccentColor(accentColor);updateProfileUI();updateStatusSelects();
})();
</script>
</body>
</html>
