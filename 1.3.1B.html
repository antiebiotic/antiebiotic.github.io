<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kanban v1.3.1A • 카카오톡 스타일 칸반보드</title>
  <meta name="application-name" content="Kanban">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kanban">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Kanban v1.3.1A • GitHub Pages ready">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FEE500'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50' font-weight='bold' fill='%23000' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%23FEE500'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='96' font-weight='bold' fill='%23000' font-family='sans-serif'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-primary:#ffffff; --bg-secondary:#f9f9fb; --bg-tertiary:#f5f5f7; --bg-hover:#e8e8ed;
      --text-primary:#1d1d1f; --text-secondary:#86868b; --text-tertiary:#aeaeb2;
      --border-color:#e8e8ed; --border-light:#f0f0f5;
      --accent-color:#FEE500; --accent-hover:#f5da00;
      --danger-bg:#fff1f0; --danger-text:#cf1322;
      --card-bg:#ffffff; --modal-overlay:rgba(0,0,0,0.4);
      --toast-bg:#1d1d1f; --toast-text:#ffffff;
      --input-bg:#ffffff; --scrollbar-thumb:#d2d2d7; --column-bg:#ffffff;
      --label-feature-bg:#e5f0ff; --label-feature-text:#0066cc;
      --label-done-bg:#e5ffe5; --label-done-text:#008800;
      --label-urgent-bg:#ffe5e5; --label-urgent-text:#cc0000;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    .dark-mode {
      --bg-primary:#000000; --bg-secondary:#0a0a0a; --bg-tertiary:#141414; --bg-hover:#1f1f1f;
      --text-primary:#f5f5f7; --text-secondary:#8e8e93; --text-tertiary:#636366;
      --border-color:#1c1c1e; --border-light:#141414;
      --card-bg:#0a0a0a; --modal-overlay:rgba(0,0,0,0.85);
      --toast-bg:#f5f5f7; --toast-text:#000000;
      --input-bg:#141414; --scrollbar-thumb:#2c2c2e; --column-bg:#0a0a0a;
      --label-feature-bg:#0a1a2e; --label-feature-text:#64b5f6;
      --label-done-bg:#0a1a0a; --label-done-text:#81c784;
      --label-urgent-bg:#1a0a0a; --label-urgent-text:#ef5350;
      --danger-bg:#1a0a0a; --danger-text:#ef5350;
    }
    body {
      background:#000; font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI','Helvetica Neue',sans-serif;
      height:100dvh; width:100dvw; overflow:hidden; color:var(--text-primary);
      display:flex; flex-direction:column; transition:background 0.3s,color 0.3s;
      -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .kanban-app {
      display:flex; flex-direction:column; height:100dvh; width:100dvw;
      background:var(--bg-primary); overflow:hidden; transition:background 0.3s;
    }
    .app-header {
      padding:0 14px; height:50px; background:var(--bg-primary);
      border-bottom:0.5px solid var(--border-color); display:flex; align-items:center;
      justify-content:space-between; flex-shrink:0; min-height:50px; gap:6px;
      transition:background 0.3s,border-color 0.3s; padding-top:env(safe-area-inset-top,0px);
    }
    .header-left { display:flex; align-items:center; gap:6px; flex-shrink:0; min-width:0; }
    .app-title { font-size:1.15rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.3px; white-space:nowrap; }
    .version-tag { font-size:0.65rem; color:var(--text-tertiary); font-weight:400; }
    .header-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .header-btn {
      background:none; border:none; font-size:1.15rem; color:var(--text-primary);
      cursor:pointer; padding:8px; border-radius:50%; transition:background 0.15s;
      flex-shrink:0; width:36px; height:36px; display:flex; align-items:center; justify-content:center; position:relative;
    }
    .header-btn:active { background:var(--bg-tertiary); transform:scale(0.95); }
    .notification-dot { position:absolute; top:6px; right:6px; width:6px; height:6px; background:#FF3B30; border-radius:50%; }
    .avatar-btn {
      width:32px; height:32px; border-radius:50%; background:var(--accent-color);
      display:flex; align-items:center; justify-content:center; font-size:0.75rem;
      font-weight:700; cursor:pointer; border:none; overflow:hidden; flex-shrink:0;
      padding:0; transition:transform 0.15s; color:#000; margin-left:2px;
    }
    .avatar-btn:active { transform:scale(0.95); }
    .avatar-btn img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .toolbar {
      padding:6px 14px; background:var(--bg-primary); border-bottom:0.5px solid var(--border-color);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
      gap:8px; min-height:40px; transition:background 0.3s,border-color 0.3s;
    }
    .view-tabs { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; align-items:center; flex:1; min-width:0; }
    .view-tabs::-webkit-scrollbar { display:none; }
    .view-tab {
      padding:5px 10px; border-radius:14px; font-size:0.78rem; font-weight:600;
      cursor:pointer; border:none; background:none; color:var(--text-secondary);
      transition:all 0.2s; font-family:inherit; white-space:nowrap; letter-spacing:-0.2px;
    }
    .view-tab.active { background:var(--accent-color); color:#000; font-weight:700; }
    .view-tab .count { font-size:0.7rem; margin-left:2px; opacity:0.7; }
    .toolbar-actions { display:flex; gap:2px; align-items:center; flex-shrink:0; }
    .btn {
      padding:5px 8px; border-radius:14px; font-size:0.75rem; font-weight:600;
      cursor:pointer; border:none; font-family:inherit; transition:all 0.15s;
      display:flex; align-items:center; gap:3px; white-space:nowrap; letter-spacing:-0.2px;
      background:none; color:var(--text-secondary);
    }
    .btn:active { transform:scale(0.95); background:var(--bg-tertiary); }
    .btn-primary { background:var(--accent-color); color:#000; font-weight:700; }
    .btn-primary:active { background:var(--accent-hover); }
    .btn-danger { color:#FF3B30; }
    .board-container {
      flex:1; overflow-x:auto; overflow-y:auto; padding:12px; display:flex; gap:12px;
      background:var(--bg-secondary); min-height:0; -webkit-overflow-scrolling:touch; transition:background 0.3s;
    }
    .column {
      min-width:260px; max-width:360px; flex:1 0 auto; background:var(--column-bg);
      border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:8px;
      border:0.5px solid var(--border-color); transition:border-color 0.2s,background 0.3s; height:fit-content; max-height:100%;
    }
    .column.drag-over { border-color:var(--accent-color); }
    .column-header { display:flex; align-items:center; justify-content:space-between; padding:0 2px 4px; flex-shrink:0; }
    .column-title-group { display:flex; align-items:center; gap:6px; min-width:0; }
    .column-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .column-name { font-weight:700; font-size:0.85rem; color:var(--text-primary); white-space:nowrap; letter-spacing:-0.2px; }
    .column-count { font-size:0.7rem; color:var(--text-tertiary); font-weight:500; }
    .column-actions { display:flex; gap:1px; }
    .column-action-btn {
      background:none; border:none; color:var(--text-tertiary); cursor:pointer;
      padding:4px 6px; border-radius:50%; font-size:0.8rem; transition:all 0.15s;
      flex-shrink:0; width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    }
    .column-action-btn:active { background:var(--bg-tertiary); color:var(--text-primary); }
    .card-list { display:flex; flex-direction:column; gap:6px; overflow-y:auto; flex:1; min-height:0; padding-right:2px; max-height:calc(100dvh - 240px); }
    .task-card {
      background:var(--card-bg); border-radius:10px; padding:10px 12px;
      border:0.5px solid var(--border-color); cursor:pointer; transition:all 0.15s ease;
      display:flex; flex-direction:column; gap:6px; user-select:none; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .task-card:active { transform:scale(0.98); background:var(--bg-tertiary); }
    .task-card.hidden { display:none; }
    .task-card.dragging { opacity:0.3; transform:scale(0.95); }
    .card-labels { display:flex; gap:3px; flex-wrap:wrap; }
    .label { padding:2px 6px; border-radius:8px; font-size:0.6rem; font-weight:700; letter-spacing:-0.1px; }
    .label.urgent { background:var(--label-urgent-bg); color:var(--label-urgent-text); }
    .label.feature { background:var(--label-feature-bg); color:var(--label-feature-text); }
    .label.done { background:var(--label-done-bg); color:var(--label-done-text); }
    .card-title { font-weight:600; font-size:0.82rem; color:var(--text-primary); line-height:1.35; display:flex; align-items:flex-start; gap:5px; letter-spacing:-0.2px; }
    .card-title i { color:var(--accent-color); margin-top:2px; flex-shrink:0; font-size:0.7rem; }
    .card-description { font-size:0.72rem; color:var(--text-secondary); line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-meta { display:flex; align-items:center; justify-content:space-between; font-size:0.65rem; color:var(--text-tertiary); flex-wrap:wrap; gap:4px; }
    .card-assignee { display:flex; align-items:center; gap:3px; }
    .card-assignee-avatar {
      width:16px; height:16px; border-radius:50%; background:var(--accent-color);
      display:flex; align-items:center; justify-content:center; font-size:0.55rem;
      font-weight:700; color:#000; flex-shrink:0; overflow:hidden;
    }
    .card-assignee-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .card-date { display:flex; align-items:center; gap:2px; }
    .card-actions-row { display:flex; gap:3px; margin-top:2px; }
    .card-move-btn {
      flex:1; padding:4px 5px; border:0.5px solid var(--border-color);
      background:var(--bg-tertiary); border-radius:6px; font-size:0.6rem;
      cursor:pointer; transition:all 0.15s; color:var(--text-secondary);
      font-family:inherit; text-align:center; -webkit-tap-highlight-color:transparent;
    }
    .card-move-btn:active { background:var(--accent-color); border-color:var(--accent-color); color:#000; }
    .empty-column-message { text-align:center; padding:20px 10px; color:var(--text-tertiary); font-size:0.75rem; display:none; letter-spacing:-0.2px; }
    .empty-column-message i { font-size:1.3rem; display:block; margin-bottom:4px; opacity:0.5; }
    .add-column-btn {
      min-width:260px; max-width:360px; flex:1 0 auto; background:none;
      border:1px dashed var(--border-color); border-radius:14px; padding:20px;
      display:flex; align-items:center; justify-content:center; gap:5px; cursor:pointer;
      color:var(--text-tertiary); font-weight:600; font-size:0.82rem; transition:all 0.2s;
      height:fit-content; font-family:inherit; letter-spacing:-0.2px;
    }
    .add-column-btn:active { border-color:var(--accent-color); color:var(--accent-color); }
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--modal-overlay); z-index:1000; display:none; align-items:flex-end; justify-content:center; }
    .modal-overlay.active { display:flex; }
    .modal-sheet { background:var(--bg-primary); border-radius:16px 16px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease; transition:background 0.3s; padding-bottom:var(--safe-bottom); }
    @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .modal-header { padding:14px 18px; border-bottom:0.5px solid var(--border-color); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-weight:700; font-size:1rem; color:var(--text-primary); letter-spacing:-0.2px; }
    .modal-close { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--text-secondary); padding:6px; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
    .modal-body { padding:14px 18px; }
    .form-group { margin-bottom:12px; }
    .form-label { display:block; font-size:0.75rem; font-weight:600; color:var(--text-secondary); margin-bottom:4px; letter-spacing:-0.2px; }
    .form-input,.form-textarea,.form-select { width:100%; padding:10px 12px; border:0.5px solid var(--border-color); border-radius:8px; font-size:0.85rem; font-family:inherit; outline:none; transition:border 0.2s; background:var(--input-bg); color:var(--text-primary); letter-spacing:-0.2px; }
    .form-input:focus,.form-textarea:focus,.form-select:focus { border-color:var(--accent-color); }
    .form-textarea { resize:vertical; min-height:50px; }
    .modal-footer { padding:10px 18px 14px; border-top:0.5px solid var(--border-color); display:flex; gap:8px; }
    .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:18px; transition:background 0.3s; }
    .login-screen.hidden { display:none; }
    .login-logo { width:80px; height:80px; background:var(--accent-color); border-radius:22px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:#000; }
    .login-title { font-size:1.5rem; font-weight:700; color:var(--text-primary); letter-spacing:-0.5px; }
    .login-form { width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px; }
    .login-input { width:100%; padding:14px 16px; border:0.5px solid var(--border-color); border-radius:12px; font-size:0.9rem; font-family:inherit; outline:none; background:var(--input-bg); color:var(--text-primary); transition:border 0.2s; letter-spacing:-0.2px; }
    .login-input:focus { border-color:var(--accent-color); }
    .login-btn { width:100%; padding:14px; border-radius:12px; font-size:0.9rem; font-weight:700; cursor:pointer; border:none; font-family:inherit; transition:all 0.15s; }
    .login-btn-primary { background:var(--accent-color); color:#000; }
    .login-btn-kakao { background:#FEE500; color:#000; display:flex; align-items:center; justify-content:center; gap:8px; opacity:0.4; cursor:not-allowed; font-size:0.8rem; }
    .login-btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); }
    .login-divider { display:flex; align-items:center; gap:12px; color:var(--text-tertiary); font-size:0.75rem; width:100%; max-width:320px; }
    .login-divider::before,.login-divider::after { content:''; flex:1; height:0.5px; background:var(--border-color); }
    .login-error { color:#FF3B30; font-size:0.75rem; text-align:center; min-height:18px; }
    .login-toggle { font-size:0.75rem; color:var(--text-secondary); cursor:pointer; text-align:center; }
    .login-toggle b { color:var(--accent-color); }
    .login-notice { background:var(--bg-tertiary); border-radius:10px; padding:10px 14px; font-size:0.7rem; color:var(--text-secondary); text-align:center; max-width:320px; line-height:1.4; }
    .toast-notification { position:fixed; bottom:calc(50px + var(--safe-bottom)); left:50%; transform:translateX(-50%); background:var(--toast-bg); color:var(--toast-text); padding:10px 20px; border-radius:20px; font-size:0.8rem; font-weight:600; z-index:2000; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; letter-spacing:-0.2px; display:flex; align-items:center; gap:8px; }
    .toast-notification.show { opacity:1; }
    .toast-undo { background:var(--accent-color); color:#000; border:none; padding:4px 10px; border-radius:12px; font-weight:700; cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .card-list::-webkit-scrollbar { width:2px; } .card-list::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:2px; }
    @media(max-width:768px) {
      .app-header { padding:0 10px; height:46px; min-height:46px; }
      .board-container { flex-direction:column; padding:8px; gap:10px; }
      .column,.add-column-btn { min-width:100%; max-width:100%; }
      .card-list { max-height:35vh; }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-logo"><i class="fas fa-columns"></i></div>
    <div class="login-title">Kanban</div>
    <div class="login-error" id="loginError"></div>
    <form class="login-form" id="signInForm">
      <input type="text" class="login-input" id="signInEmail" placeholder="아이디" autocomplete="username">
      <input type="password" class="login-input" id="signInPassword" placeholder="비밀번호" autocomplete="current-password">
      <button type="submit" class="login-btn login-btn-primary">로그인</button>
    </form>
    <form class="login-form" id="signUpForm" style="display:none">
      <input type="text" class="login-input" id="signUpName" placeholder="이름">
      <input type="text" class="login-input" id="signUpEmail" placeholder="아이디" autocomplete="username">
      <input type="password" class="login-input" id="signUpPassword" placeholder="비밀번호" autocomplete="new-password">
      <button type="submit" class="login-btn login-btn-primary">회원가입</button>
    </form>
    <div class="login-divider"><span>또는</span></div>
    <button class="login-btn login-btn-kakao" disabled><i class="fas fa-comment"></i> 카카오 로그인 (GitHub Pages 미지원)</button>
    <button class="login-btn login-btn-secondary" id="guestLoginBtn" style="max-width:320px"><i class="fas fa-user"></i> 게스트로 계속하기</button>
    <div class="login-toggle" id="loginToggle">계정이 없으신가요? <b>회원가입</b></div>
    <div class="login-notice">⚠️ GitHub Pages에서는 카카오 로그인이 지원되지 않습니다.<br>로컬 계정 또는 게스트로 이용해주세요.</div>
  </div>

  <div class="kanban-app" id="kanbanApp" style="display:none">
    <header class="app-header">
      <div class="header-left"><span class="app-title">Kanban</span><span class="version-tag">v1.3.1A</span></div>
      <div class="header-actions">
        <button class="header-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        <button class="header-btn" id="shareKakaoHeaderBtn"><i class="fas fa-share-alt"></i></button>
        <button class="header-btn" id="notificationsBtn"><i class="far fa-bell"></i><span class="notification-dot"></span></button>
        <button class="header-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
        <button class="avatar-btn" id="profileBtn"><img id="headerAvatar" src="" alt="Profile" style="display:none"><span id="headerAvatarText">ME</span></button>
      </div>
    </header>
    <div class="toolbar">
      <div class="view-tabs" id="viewTabs">
        <button class="view-tab active" data-filter="all">전체 <span class="count">0</span></button>
        <button class="view-tab" data-filter="todo">할 일 <span class="count">0</span></button>
        <button class="view-tab" data-filter="inprogress">진행중 <span class="count">0</span></button>
        <button class="view-tab" data-filter="done">완료 <span class="count">0</span></button>
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-primary" id="globalAddBtn"><i class="fas fa-plus"></i> 추가</button>
      </div>
    </div>
    <main class="board-container" id="boardContainer"></main>
  </div>

  <div class="modal-overlay" id="taskModal"><div class="modal-sheet"><div class="modal-header"><span class="modal-title" id="modalTitle">작업 상세</span><button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label">제목</label><input type="text" class="form-input" id="editTitle"></div><div class="form-group"><label class="form-label">설명</label><textarea class="form-textarea" id="editDesc"></textarea></div><div class="form-group"><label class="form-label">담당자</label><input type="text" class="form-input" id="editAssignee"></div><div class="form-group"><label class="form-label">상태</label><select class="form-select" id="editStatus"></select></div></div><div class="modal-footer"><button class="btn btn-danger" id="deleteTaskBtn" style="flex:1">삭제</button><button class="btn btn-primary" id="saveTaskBtn" style="flex:2">저장</button></div></div></div>
  <div class="modal-overlay" id="settingsModal"><div class="modal-sheet"><div class="modal-header"><span class="modal-title">설정</span><button class="modal-close" id="settingsClose"><i class="fas fa-times"></i></button></div><div class="modal-body">
    <div class="settings-section"><h4>계정</h4><button class="btn" id="logoutBtn" style="background:var(--bg-tertiary);color:#FF3B30"><i class="fas fa-sign-out-alt"></i> 로그아웃</button></div>
    <div class="settings-section"><h4>테마</h4><div style="display:flex;gap:6px"><button class="btn" id="lightModeBtn" style="background:var(--bg-tertiary)"><i class="fas fa-sun"></i> 라이트</button><button class="btn" id="darkModeBtn" style="background:var(--bg-tertiary)"><i class="fas fa-moon"></i> 다크</button></div></div>
    <div class="settings-section"><h4>공유</h4><button class="btn" id="shareToKakaoBtn" style="background:#FEE500;color:#000;width:100%"><i class="fas fa-comment"></i> 카카오톡으로 공유</button></div>
    <div class="settings-section"><h4>데이터</h4><div style="display:flex;gap:6px"><button class="btn" id="settingsExport" style="background:var(--bg-tertiary)"><i class="fas fa-download"></i> 내보내기</button><button class="btn" id="settingsImport" style="background:var(--bg-tertiary)"><i class="fas fa-upload"></i> 가져오기</button><button class="btn btn-danger" id="settingsReset"><i class="fas fa-trash-alt"></i> 초기화</button></div></div>
  </div></div></div>
  <div class="add-task-popup" id="addTaskPopup"><div class="add-task-sheet"><div class="sheet-handle"></div><div class="sheet-header"><span class="sheet-title">새 작업</span><button class="sheet-close" id="popupClose"><i class="fas fa-times"></i></button></div><div class="sheet-body"><input type="text" class="quick-add-input" id="quickTaskTitle" placeholder="할 일 입력..."><select class="quick-add-select" id="quickTaskStatus"></select></div><div class="sheet-actions"><button class="btn" id="popupCancel" style="flex:1;background:var(--bg-tertiary)">취소</button><button class="btn btn-primary" id="popupAdd" style="flex:2">추가</button></div></div></div>
  <div class="toast-notification" id="appToast"></div>

  <script>
(function(){
  const STORAGE_KEY='kanban_v131a',USERS_KEY='kanban_users_v3',SESSION_KEY='kanban_session_v3';
  const DEFAULT_COLUMNS=[{id:'todo',name:'할 일',color:'#FEE500'},{id:'inprogress',name:'진행중',color:'#007AFF'},{id:'done',name:'완료',color:'#34C759'}];
  let taskIdCounter=1,currentFilter='all',editingCard=null,isDarkMode=true,accentColor='#FEE500';
  let profileData={name:'ME',photo:null},columns=JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
  let currentUser=null;

  const boardContainer=document.getElementById('boardContainer'),taskModal=document.getElementById('taskModal');
  const addTaskPopup=document.getElementById('addTaskPopup'),settingsModal=document.getElementById('settingsModal');
  const toast=document.getElementById('appToast'),loginScreen=document.getElementById('loginScreen'),kanbanApp=document.getElementById('kanbanApp');

  function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||{}}catch(e){return{}}}
  function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}
  function saveSession(u){localStorage.setItem(SESSION_KEY,JSON.stringify(u))}
  function getSession(){try{return JSON.parse(localStorage.getItem(SESSION_KEY))||null}catch(e){return null}}
  function clearSession(){localStorage.removeItem(SESSION_KEY)}
  function hash(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return 'h_'+Math.abs(h).toString(36)}

  function loginUser(user){
    currentUser=user;profileData={name:user.name,photo:user.photo||null};saveSession(user);
    kanbanApp.style.display='flex';loginScreen.classList.add('hidden');
    updateProfileUI();loadAllData();applyFilter('all');updateAccentColor(accentColor);updateStatusSelects();
    showToast(`${user.name}님 환영합니다`);
  }
  function logout(){
    currentUser=null;profileData={name:'ME',photo:null};columns=JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
    clearSession();kanbanApp.style.display='none';loginScreen.classList.remove('hidden');showToast('로그아웃되었습니다');
  }
  function restoreSession(){
    const s=getSession();if(!s)return false;
    if(s.provider==='local'){const users=getUsers();if(users[s.id]&&users[s.id].name===s.name){loginUser(s);return true}else{clearSession()}}
    else if(s.provider==='guest'){loginUser(s);return true}
    return false;
  }

  document.getElementById('signInForm').addEventListener('submit',e=>{
    e.preventDefault();const u=document.getElementById('signInEmail').value.trim().toLowerCase(),p=document.getElementById('signInPassword').value;
    if(!u||!p)return;const users=getUsers();
    if(users[u]&&users[u].password===hash(p))loginUser({id:u,name:users[u].name,photo:users[u].photo||null,provider:'local'});
    else document.getElementById('loginError').textContent='아이디 또는 비밀번호가 틀렸습니다';
  });
  document.getElementById('signUpForm').addEventListener('submit',e=>{
    e.preventDefault();const name=document.getElementById('signUpName').value.trim(),u=document.getElementById('signUpEmail').value.trim().toLowerCase(),p=document.getElementById('signUpPassword').value;
    if(!name||!u||!p)return;const users=getUsers();
    if(users[u]){document.getElementById('loginError').textContent='이미 존재하는 아이디입니다';return}
    users[u]={name,password:hash(p),photo:null};saveUsers(users);
    document.getElementById('signUpForm').style.display='none';document.getElementById('signInForm').style.display='flex';
    document.getElementById('loginError').textContent='';showToast('회원가입 완료! 로그인해주세요');
  });
  document.getElementById('loginToggle').addEventListener('click',()=>{
    const si=document.getElementById('signInForm'),su=document.getElementById('signUpForm'),isSu=su.style.display!=='none';
    si.style.display=isSu?'flex':'none';su.style.display=isSu?'none':'flex';document.getElementById('loginError').textContent='';
  });
  document.getElementById('guestLoginBtn').addEventListener('click',()=>loginUser({id:'guest_'+Date.now(),name:'게스트',photo:null,provider:'guest'}));
  document.getElementById('logoutBtn').addEventListener('click',logout);

  function initKakao(){try{if(window.Kakao&&!Kakao.isInitialized())Kakao.init('YOUR_KAKAO_APP_KEY')}catch(e){}}
  function shareToKakaoTalk(){
    if(!window.Kakao||!Kakao.isInitialized()){initKakao();if(!window.Kakao||!Kakao.isInitialized()){showToast('카카오 SDK가 초기화되지 않았습니다');return}}
    const total=document.querySelectorAll('.task-card').length,done=document.querySelectorAll('.task-card[data-status="done"]').length;
    Kakao.Link.sendDefault({objectType:'feed',content:{title:`Kanban - ${profileData.name}`,description:`${total} tasks • ${done} done`,imageUrl:'https://via.placeholder.com/300x300/FEE500/000000?text=K',link:{mobileWebUrl:location.href,webUrl:location.href}},buttons:[{title:'보드 열기',link:{mobileWebUrl:location.href,webUrl:location.href}}]});
  }

  function updateProfileUI(){
    const ha=document.getElementById('headerAvatar'),hat=document.getElementById('headerAvatarText');
    if(profileData.photo){ha.src=profileData.photo;ha.style.display='block';hat.style.display='none'}else{ha.style.display='none';hat.style.display='block';hat.textContent=profileData.name.charAt(0).toUpperCase()}
  }
  function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._hideTimer);toast._hideTimer=setTimeout(()=>toast.classList.remove('show'),1800)}
  function getCardTitle(card){const t=card.querySelector('.card-title');if(!t)return'';const c=t.cloneNode(true);const i=c.querySelector('i');if(i)i.remove();return c.textContent.trim()}
  function updateColumnCounts(){
    columns.forEach(col=>{const ce=document.querySelector(`.column[data-status="${col.id}"]`);if(ce){const cnt=ce.querySelectorAll('.task-card').length;ce.querySelector('.column-count').textContent=cnt;ce.querySelector('.empty-column-message').style.display=cnt===0?'block':'none'}});
  }
  function applyFilter(filter){currentFilter=filter;document.querySelectorAll('.task-card').forEach(c=>c.classList.toggle('hidden',filter!=='all'&&c.dataset.status!==filter))}
  function moveCard(card,newStatus){
    const tl=document.querySelector(`.column[data-status="${newStatus}"] .card-list`);if(!tl||!card)return;
    card.dataset.status=newStatus;updateCardMoveButtons(card);
    const label=card.querySelector('.label');if(label){const cd=columns.find(c=>c.id===newStatus);label.className='label '+(cd&&cd.id==='done'?'done':'feature');label.textContent=cd&&cd.id==='done'?'완료':'기능'}
    tl.appendChild(card);updateColumnCounts();saveAllData();applyFilter(currentFilter);
  }
  function updateCardMoveButtons(card){
    const ar=card.querySelector('.card-actions-row');if(!ar)return;const cs=card.dataset.status,ci=columns.findIndex(c=>c.id===cs);
    ar.innerHTML=columns.filter(c=>c.id!==cs).map(c=>{const arrow=columns.findIndex(col=>col.id===c.id)>ci?'→':'←';return `<button class="card-move-btn" data-move="${c.id}">${arrow} ${c.name}</button>`}).join('');
    ar.querySelectorAll('.card-move-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();moveCard(card,b.dataset.move)}));
  }
  function createCardElement(title,status,desc='',assignee='',dateStr=null){
    if(!dateStr){const d=new Date();dateStr=`${d.getMonth()+1}/${d.getDate()}`}if(!assignee)assignee=profileData.name||'ME';
    const id=taskIdCounter++;const card=document.createElement('div');card.className='task-card';card.dataset.status=status;card.dataset.id=id;card.draggable=true;
    const cd=columns.find(c=>c.id===status);const labelCls=cd&&cd.id==='done'?'done':'feature';const labelTxt=cd&&cd.id==='done'?'완료':'기능';
    const av=profileData.photo?`<img src="${profileData.photo}" alt="${assignee}">`:assignee.charAt(0).toUpperCase();
    card.innerHTML=`<div class="card-labels"><span class="label ${labelCls}">${labelTxt}</span></div><div class="card-title"><i class="far fa-sticky-note"></i> ${escapeHTML(title)}</div><div class="card-description">${escapeHTML(desc||'설명 없음')}</div><div class="card-meta"><div class="card-assignee"><span class="card-assignee-avatar">${av}</span> ${escapeHTML(assignee)}</div><div class="card-date"><i class="far fa-calendar-alt"></i> ${dateStr}</div></div><div class="card-actions-row"></div>`;
    updateCardMoveButtons(card);return card;
  }
  function escapeHTML(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function attachCardEvents(card){
    card.addEventListener('click',e=>{if(!e.target.closest('.card-move-btn'))openEditModal(card)});
    card.addEventListener('dragstart',e=>{card.classList.add('dragging');e.dataTransfer.setData('text/plain',card.dataset.id)});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  }
  function openEditModal(card){editingCard=card;document.getElementById('editTitle').value=getCardTitle(card);document.getElementById('editDesc').value=card.querySelector('.card-description')?.textContent||'';document.getElementById('editAssignee').value=card.querySelector('.card-assignee')?.textContent.trim()||profileData.name;updateStatusSelects();document.getElementById('editStatus').value=card.dataset.status;taskModal.classList.add('active');document.getElementById('editTitle').focus()}
  function closeEditModal(){taskModal.classList.remove('active');editingCard=null}
  function saveTaskChanges(){
    if(!editingCard)return;const title=document.getElementById('editTitle').value.trim();if(!title){showToast('제목을 입력하세요');return}
    const desc=document.getElementById('editDesc').value.trim(),assignee=document.getElementById('editAssignee').value.trim()||profileData.name,newStatus=document.getElementById('editStatus').value;
    editingCard.querySelector('.card-title').innerHTML=`<i class="far fa-sticky-note"></i> ${escapeHTML(title)}`;
    editingCard.querySelector('.card-description').textContent=desc||'설명 없음';
    const av=profileData.photo?`<img src="${profileData.photo}" alt="${assignee}">`:assignee.charAt(0).toUpperCase();
    const ae=editingCard.querySelector('.card-assignee');if(ae)ae.innerHTML=`<span class="card-assignee-avatar">${av}</span> ${escapeHTML(assignee)}`;
    if(editingCard.dataset.status!==newStatus)moveCard(editingCard,newStatus);
    updateColumnCounts();saveAllData();closeEditModal();showToast('저장됨');
  }
  function deleteTask(){
    if(!editingCard||!confirm('삭제하시겠습니까?'))return;
    editingCard.remove();updateColumnCounts();saveAllData();closeEditModal();showToast('삭제됨');
  }
  function openAddPopup(preset=null){quickTaskTitle.value='';updateStatusSelects();if(preset)quickTaskStatus.value=preset;addTaskPopup.classList.add('active');setTimeout(()=>quickTaskTitle.focus(),100)}
  function closeAddPopup(){addTaskPopup.classList.remove('active')}
  function addTaskFromPopup(){
    const title=quickTaskTitle.value.trim();if(!title){showToast('제목을 입력하세요');return}
    const status=quickTaskStatus.value,card=createCardElement(title,status);
    const list=document.querySelector(`.column[data-status="${status}"] .card-list`);
    if(list){list.appendChild(card);attachCardEvents(card);updateColumnCounts();if(currentFilter!=='all'&&currentFilter!==status)card.classList.add('hidden');saveAllData();showToast('추가됨')}
    closeAddPopup();
  }
  function updateStatusSelects(){[document.getElementById('editStatus'),document.getElementById('quickTaskStatus')].forEach(sel=>{if(!sel)return;const v=sel.value;sel.innerHTML=columns.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');if(columns.find(c=>c.id===v))sel.value=v})}
  function renderAllColumns(){
    boardContainer.innerHTML='';
    columns.forEach(col=>{const el=document.createElement('div');el.className='column';el.dataset.status=col.id;el.innerHTML=`<div class="column-header"><div class="column-title-group"><span class="column-dot" style="background:${col.color}"></span><span class="column-name">${col.name}</span><span class="column-count">0</span></div><div class="column-actions"><button class="column-action-btn column-add-btn" data-add-to="${col.id}"><i class="fas fa-plus"></i></button></div></div><div class="card-list"></div><div class="empty-column-message">비어있음</div>`;boardContainer.appendChild(el)});
    const addBtn=document.createElement('button');addBtn.className='add-column-btn';addBtn.id='addColumnTrigger';addBtn.innerHTML=`<i class="fas fa-plus"></i> 리스트 추가`;boardContainer.appendChild(addBtn);
    document.querySelectorAll('.column-add-btn').forEach(b=>b.addEventListener('click',()=>openAddPopup(b.dataset.addTo)));
    document.querySelectorAll('.column').forEach(col=>{col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over')});col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');const dc=document.querySelector('.task-card.dragging');if(dc)moveCard(dc,col.dataset.status)})});
    document.getElementById('addColumnTrigger').addEventListener('click',()=>{const name=prompt('리스트 이름:');if(name&&name.trim()){columns.push({id:'col_'+Date.now(),name:name.trim(),color:'#FEE500'});renderAllColumns();updateStatusSelects();saveAllData()}});
  }

  function getUserStorageKey(){return currentUser?STORAGE_KEY+'_'+currentUser.id:STORAGE_KEY+'_guest'}
  function saveAllData(){
    if(!currentUser)return;
    const tasks=[];document.querySelectorAll('.task-card').forEach(c=>{tasks.push({id:c.dataset.id,title:getCardTitle(c),desc:c.querySelector('.card-description')?.textContent||'',assignee:c.querySelector('.card-assignee')?.textContent.trim()||profileData.name,status:c.dataset.status,date:c.querySelector('.card-date')?.textContent.trim()||''})});
    try{localStorage.setItem(getUserStorageKey(),JSON.stringify({tasks,nextId:taskIdCounter,isDarkMode,accentColor,columns}))}catch(e){}
  }
  function loadAllData(){
    if(!currentUser)return;
    const saved=localStorage.getItem(getUserStorageKey());if(!saved){renderAllColumns();updateColumnCounts();updateStatusSelects();return}
    try{const data=JSON.parse(saved);taskIdCounter=data.nextId||1;if(data.isDarkMode!==undefined)isDarkMode=data.isDarkMode;if(data.accentColor)accentColor=data.accentColor;if(data.columns?.length)columns=data.columns;document.body.classList.toggle('dark-mode',isDarkMode);updateAccentColor(accentColor);renderAllColumns();updateStatusSelects();
    document.querySelectorAll('.task-card').forEach(c=>c.remove());
    (data.tasks||[]).forEach(t=>{if(columns.find(c=>c.id===t.status)){const card=createCardElement(t.title,t.status,t.desc,t.assignee,t.date);card.dataset.id=t.id;const list=document.querySelector(`.column[data-status="${t.status}"] .card-list`);if(list){list.appendChild(card);attachCardEvents(card)}}});
    taskIdCounter=Math.max(taskIdCounter,Math.max(...(data.tasks||[]).map(t=>parseInt(t.id)||0),0)+1);updateColumnCounts()}catch(e){renderAllColumns();updateColumnCounts()}
  }
  function updateAccentColor(c){accentColor=c;document.documentElement.style.setProperty('--accent-color',c);document.documentElement.style.setProperty('--accent-hover',c+'dd')}
  function exportBoard(){const d=localStorage.getItem(getUserStorageKey());if(!d)return showToast('데이터 없음');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download='kanban_backup.json';a.click()}
  function importBoard(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.tasks){localStorage.setItem(getUserStorageKey(),JSON.stringify(data));loadAllData();showToast('가져오기 완료')}}catch(ex){showToast('잘못된 파일')}};r.readAsText(f)};inp.click()}
  function resetBoard(){if(!confirm('초기화하시겠습니까?'))return;localStorage.removeItem(getUserStorageKey());columns=JSON.parse(JSON.stringify(DEFAULT_COLUMNS));document.querySelectorAll('.task-card').forEach(c=>c.remove());taskIdCounter=1;renderAllColumns();updateStatusSelects();updateColumnCounts();showToast('초기화됨')}

  document.getElementById('viewTabs').addEventListener('click',e=>{const tab=e.target.closest('.view-tab');if(!tab)return;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');applyFilter(tab.dataset.filter)});
  document.getElementById('modalClose').addEventListener('click',closeEditModal);taskModal.addEventListener('click',e=>{if(e.target===taskModal)closeEditModal()});
  document.getElementById('saveTaskBtn').addEventListener('click',saveTaskChanges);document.getElementById('deleteTaskBtn').addEventListener('click',deleteTask);
  document.getElementById('settingsBtn').addEventListener('click',()=>settingsModal.classList.add('active'));
  document.getElementById('settingsClose').addEventListener('click',()=>settingsModal.classList.remove('active'));
  settingsModal.addEventListener('click',e=>{if(e.target===settingsModal)settingsModal.classList.remove('active')});
  document.getElementById('lightModeBtn').addEventListener('click',()=>{isDarkMode=false;document.body.classList.remove('dark-mode');saveAllData()});
  document.getElementById('darkModeBtn').addEventListener('click',()=>{isDarkMode=true;document.body.classList.add('dark-mode');saveAllData()});
  document.getElementById('shareToKakaoBtn').addEventListener('click',shareToKakaoTalk);
  document.getElementById('settingsExport').addEventListener('click',exportBoard);
  document.getElementById('settingsImport').addEventListener('click',importBoard);
  document.getElementById('settingsReset').addEventListener('click',resetBoard);
  document.getElementById('notificationsBtn').addEventListener('click',()=>showToast('알림 없음'));
  document.getElementById('shareKakaoHeaderBtn').addEventListener('click',shareToKakaoTalk);
  document.getElementById('popupClose').addEventListener('click',closeAddPopup);document.getElementById('popupCancel').addEventListener('click',closeAddPopup);
  addTaskPopup.addEventListener('click',e=>{if(e.target===addTaskPopup)closeAddPopup()});
  document.getElementById('popupAdd').addEventListener('click',addTaskFromPopup);
  document.getElementById('quickTaskTitle').addEventListener('keypress',e=>{if(e.key==='Enter')addTaskFromPopup()});
  document.getElementById('globalAddBtn').addEventListener('click',()=>openAddPopup());
  document.getElementById('searchBtn').addEventListener('click',()=>{
    const term=prompt('작업 검색:');
    if(term){document.querySelectorAll('.task-card').forEach(c=>{const t=getCardTitle(c).toLowerCase(),d=(c.querySelector('.card-description')?.textContent||'').toLowerCase();c.style.display=(t.includes(term.toLowerCase())||d.includes(term.toLowerCase()))?'':'none'})}
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(addTaskPopup.classList.contains('active'))closeAddPopup();else if(taskModal.classList.contains('active'))closeEditModal();else settingsModal.classList.remove('active')}});

  initKakao();
  if(!restoreSession()){document.getElementById('kanbanApp').style.display='none';loginScreen.classList.remove('hidden')}
})();
</script>
</body>
</html>
