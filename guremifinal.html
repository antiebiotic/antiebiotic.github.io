<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header"><h1>개미 Note</h1><div class="header-actions"><div class="save-indicator"><span class="save-dot saved" id="saveDot"></span><span id="saveLabel">저장됨</span></div><button class="icon-btn" id="settingsBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button></div></div>
    <div class="search-wrap"><div class="search-box"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-input" id="searchInput" placeholder="문서 검색"></div></div>
    <div class="filter-row" id="filterRow"><button class="filter-tab active" data-filter="all" id="filterAllBtn">전체</button><button class="filter-tab" data-filter="pinned" id="filterPinnedBtn">고정</button><button class="filter-tab" data-filter="images" id="filterImagesBtn">이미지</button><button class="add-filter-btn" id="addFilterBtn">+</button></div>
    <div class="note-list" id="noteList"></div>
    <button class="new-note-btn" id="newNoteBtn"><svg width="14" height="14" viewBox="0 0 24 24" style="stroke:currentColor;fill:none;stroke-width:2.5;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> <span id="newNoteLabel">새 문서</span></button>
  </div>
  <div class="main-panel" id="mainPanel">
    <div class="panel-header"><button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button><div class="title-dropdown" id="titleDropdown"><span class="panel-title" id="panelTitle">문서</span><span class="chevron">▾</span><div class="dropdown-menu" id="toolsMenu"></div></div></div>
    <div class="panel-content" id="panelContent"><div class="editor-rich" id="editor" contenteditable="true" data-placeholder="내용을 입력하세요..."></div></div>
    <div class="panel-footer"><div class="tag-chips" id="tagChips"></div><button class="add-tag-btn" id="addTagToNoteBtn">+ 태그</button><span style="flex:1;"></span><span style="font-size:10px;opacity:0.5;" id="editorTime"></span><button class="btn" id="saveBtn">저장</button></div>
    <div class="empty-panel" id="emptyPanel">( •_•)<span id="emptyText">문서를 선택하세요</span></div>
  </div>
  <div class="modal-overlay" id="settingsOverlay"><div class="modal"><button class="modal-close" id="closeSettings"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button><h2 id="settingsTitle">설정</h2><div class="setting-row"><span class="setting-label"><span id="themeLabel">테마</span></span><div class="toggle-group" id="themeToggle"><button class="toggle-btn active" data-theme="light">라이트</button><button class="toggle-btn" data-theme="glass">OLED Glass</button></div></div><div class="setting-row"><span class="setting-label"><span id="langLabel">언어</span></span><div class="toggle-group" id="langToggle"><button class="toggle-btn active" data-lang="ko">한국어</button><button class="toggle-btn" data-lang="en">English</button></div></div><div class="ref-display"><span id="refLabel">내 참조 코드</span>: <strong id="refCodeDisplay"></strong></div><div class="json-actions"><button class="btn" id="exportBtn"><span id="exportLabel">내보내기</span></button><button class="btn" id="importBtn"><span id="importLabel">가져오기</span></button></div><div class="credit">Created by Antibiotic<br>Made in New York<br>Packaged in Korea<br>서울특별시 강남구 테헤란로 427, 06159</div></div></div>
  <div class="lightbox" id="lightbox"><button class="lightbox-close" id="lightboxClose">✕</button><img id="lightboxImg" src="" alt=""></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="importFile" accept=".json" style="display:none;"><input type="file" id="imageFileInput" accept="image/*" multiple style="display:none;">
</div>
<script>
(() => {
  const els={noteList:document.getElementById('noteList'),mainPanel:document.getElementById('mainPanel'),panelContent:document.getElementById('panelContent'),editor:document.getElementById('editor'),editorTime:document.getElementById('editorTime'),saveBtn:document.getElementById('saveBtn'),backBtn:document.getElementById('backBtn'),emptyPanel:document.getElementById('emptyPanel'),saveDot:document.getElementById('saveDot'),saveLabel:document.getElementById('saveLabel'),settingsBtn:document.getElementById('settingsBtn'),settingsOverlay:document.getElementById('settingsOverlay'),closeSettings:document.getElementById('closeSettings'),exportBtn:document.getElementById('exportBtn'),importBtn:document.getElementById('importBtn'),importFile:document.getElementById('importFile'),toast:document.getElementById('toast'),themeToggle:document.getElementById('themeToggle'),langToggle:document.getElementById('langToggle'),newNoteBtn:document.getElementById('newNoteBtn'),refCodeDisplay:document.getElementById('refCodeDisplay'),searchInput:document.getElementById('searchInput'),filterRow:document.getElementById('filterRow'),addFilterBtn:document.getElementById('addFilterBtn'),tagChipsContainer:document.getElementById('tagChips'),addTagToNoteBtn:document.getElementById('addTagToNoteBtn'),imageFileInput:document.getElementById('imageFileInput'),lightbox:document.getElementById('lightbox'),lightboxImg:document.getElementById('lightboxImg'),lightboxClose:document.getElementById('lightboxClose'),titleDropdown:document.getElementById('titleDropdown'),toolsMenu:document.getElementById('toolsMenu'),panelTitle:document.getElementById('panelTitle'),filterAllBtn:document.getElementById('filterAllBtn'),filterPinnedBtn:document.getElementById('filterPinnedBtn'),filterImagesBtn:document.getElementById('filterImagesBtn')};

  let notes=[],currentId=null,settings={theme:'light',lang:'ko'},refCode=null;
  let activeFilter='all',customTags=[],currentImages=[],currentLinks=[],editingSubjectId=null;
  let currentFontSize=15,currentFontFamily='gothic-a1';
  const fontFamilies={ 'gothic-a1':"'Gothic A1',sans-serif", 'noto-serif':"'Noto Serif KR',serif", 'gaegu':"'Gaegu',cursive", 'nanum-pen':"'Nanum Pen Script',cursive" };
  const colors=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD','#F0C060','#FF8A5C','#6C5CE7'];
  function avatarColor(id){return colors[(id||'a').charCodeAt(0)%colors.length];}
  function initials(text){const w=(text||'문서').trim().split(/\s+/);return w.length>=2?(w[0][0]+w[1][0]).toUpperCase():(w[0]?.[0]||'A').toUpperCase();}
  function stripHTML(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent||d.innerText||'';}
  function getTitle(html){return stripHTML(html||'').split('\n')[0].substring(0,40)||'제목 없음';}
  function getPreview(html){const lines=stripHTML(html||'').split('\n');return lines.length>1?lines[1].substring(0,40):'';}
  function squirclePath(w,h,r){return`M${r},0 h${w-2*r} q${r},0 ${r},${r} v${h-2*r} q0,${r} -${r},${r} h-${w-2*r} q-${r},0 -${r},-${r} v-${h-2*r} q0,-${r} ${r},-${r} z`;}
  function avatarHTML(id,text,images){if(images&&images.length>0)return`<img src="${images[0]}" alt="">`;return`<svg viewBox="0 0 44 44"><path d="${squirclePath(44,44,12)}" fill="${avatarColor(id)}"/></svg><span class="avatar-text">${initials(stripHTML(text||''))}</span>`;}

  const i18n={ko:{title:"개미 Note",saved:'저장됨',newNote:'새 문서',placeholder:'내용을 입력하세요...',save:'저장',delete:'삭제',memo:'문서',settings:'설정',theme:'테마',lang:'언어',export:'내보내기',import:'가져오기',noNotes:'문서가 없습니다',deleteConfirm:'이 문서를 삭제할까요?',savedToast:'저장됨',refLabel:'참조 코드',selectNote:'문서를 선택하세요',search:'문서 검색',filterAll:'전체',filterPinned:'고정',filterImages:'이미지',addTag:'태그',addTagToNote:'태그 추가',noTags:'태그 없음',imageAdded:'이미지 추가됨',linkAdded:'링크 추가됨',docxExported:'DOCX 다운로드됨',fontSection:'글자 스타일',sizeSection:'글자 크기',toolsSection:'도구',exportSection:'내보내기',fontDefault:'기본',fontSerif:'명조',fontHand:'손글씨',fontPen:'펜글씨',sizeSmall:'작게',sizeNormal:'보통',sizeLarge:'크게',sizeXLarge:'아주 크게',imageAdd:'이미지 추가',shareJSON:'JSON',shareTXT:'TXT',shareDOCX:'DOCX',shareKakao:'카카오톡',deleteItem:'삭제'},en:{title:"Ant's Docs",saved:'Saved',newNote:'New Doc',placeholder:'Type...',save:'Save',delete:'Delete',memo:'Document',settings:'Settings',theme:'Theme',lang:'Language',export:'Export',import:'Import',noNotes:'No documents',deleteConfirm:'Delete?',savedToast:'Saved',refLabel:'Ref Code',selectNote:'Select a document',search:'Search',filterAll:'All',filterPinned:'Pinned',filterImages:'Images',addTag:'Tag',addTagToNote:'Add tag',noTags:'No tags',imageAdded:'Image added',linkAdded:'Link added',docxExported:'DOCX downloaded',fontSection:'Font Style',sizeSection:'Font Size',toolsSection:'Tools',exportSection:'Export',fontDefault:'Default',fontSerif:'Serif',fontHand:'Handwriting',fontPen:'Pen Script',sizeSmall:'Small',sizeNormal:'Normal',sizeLarge:'Large',sizeXLarge:'X-Large',imageAdd:'Add Image',shareJSON:'JSON',shareTXT:'TXT',shareDOCX:'DOCX',shareKakao:'KakaoTalk',deleteItem:'Delete'}};
  function t(k){return i18n[settings.lang]?.[k]||i18n.ko[k]||k;}

  const DB={name:'AntsNotesDBv2',version:1,storeName:'notes',
    init(){return new Promise((resolve,reject)=>{const request=indexedDB.open(this.name,this.version);request.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains(this.storeName)){db.createObjectStore(this.storeName,{keyPath:'id'});}};request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error);});},
    async saveNote(note){const db=await this.init();return new Promise((resolve,reject)=>{const tx=db.transaction(this.storeName,'readwrite');const store=tx.objectStore(this.storeName);store.put(note);tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error);});},
    async getAllNotes(){const db=await this.init();return new Promise((resolve,reject)=>{const tx=db.transaction(this.storeName,'readonly');const store=tx.objectStore(this.storeName);const request=store.getAll();request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error);});},
    async deleteNote(id){const db=await this.init();return new Promise((resolve,reject)=>{const tx=db.transaction(this.storeName,'readwrite');const store=tx.objectStore(this.storeName);store.delete(id);tx.oncomplete=()=>resolve(true);tx.onerror=()=>reject(tx.error);});}
  };

  function genRef(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<8;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
  function showToast(m,d=1800){els.toast.textContent=m;els.toast.classList.add('show');setTimeout(()=>els.toast.classList.remove('show'),d);}
  function fmtTime(ts){const d=new Date(ts),n=new Date();const h=String(d.getHours()).padStart(2,'0'),mn=String(d.getMinutes()).padStart(2,'0');return d.toDateString()===n.toDateString()?(settings.lang==='ko'?`오늘 ${h}:${mn}`:`Today ${h}:${mn}`):`${d.getMonth()+1}/${d.getDate()} ${h}:${mn}`;}
  function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function loadTags(){try{customTags=JSON.parse(localStorage.getItem('ants_tags'))||[];}catch{customTags=[];}}
  function saveTags(){localStorage.setItem('ants_tags',JSON.stringify(customTags));}
  function loadSettings(){try{settings=JSON.parse(localStorage.getItem('ants_settings'))||{theme:'light',lang:'ko'};}catch{settings={theme:'light',lang:'ko'};}}
  function saveSettings(){localStorage.setItem('ants_settings',JSON.stringify(settings));}

  // SINGLE SAVE FUNCTION - the only way data gets persisted
  async function saveNote(){
    if(!currentId) return;
    const existing=notes.find(n=>n.id===currentId)||{tags:[]};
    const note={
      id:currentId, text:els.editor.innerHTML, time:Date.now(),
      pinned:existing.pinned||false, tags:existing.tags||[],
      images:[...currentImages], links:[...currentLinks],
      fontSize:currentFontSize, fontFamily:currentFontFamily, refCode
    };
    const idx=notes.findIndex(n=>n.id===currentId);
    if(idx>=0) notes[idx]=note; else notes.push(note);
    try{await DB.saveNote(note);}catch(e){console.error('save failed',e);}
    els.saveDot.classList.add('saved');els.saveLabel.textContent=t('saved');
    setTimeout(()=>{els.saveDot.classList.remove('saved');els.saveLabel.textContent=t('saved');},1500);
    els.editorTime.textContent=fmtTime(Date.now());renderTagChips();
  }
  let saveTimer=null;
  function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNote,600);}

  async function loadCloud(ref){try{const all=await DB.getAllNotes();notes=all.filter(n=>n.refCode===ref);return notes.length>0;}catch(e){return false;}}

  function buildToolsMenu(){els.toolsMenu.innerHTML=`<div class="dropdown-section">${t('fontSection')}</div><div class="dropdown-item${currentFontFamily==='gothic-a1'?' active':''}" data-action="font" data-font="gothic-a1">${t('fontDefault')}</div><div class="dropdown-item${currentFontFamily==='noto-serif'?' active':''}" data-action="font" data-font="noto-serif">${t('fontSerif')}</div><div class="dropdown-item${currentFontFamily==='gaegu'?' active':''}" data-action="font" data-font="gaegu">${t('fontHand')}</div><div class="dropdown-item${currentFontFamily==='nanum-pen'?' active':''}" data-action="font" data-font="nanum-pen">${t('fontPen')}</div><div class="dropdown-section">${t('sizeSection')}</div><div class="dropdown-item${currentFontSize===13?' active':''}" data-action="size" data-size="13">${t('sizeSmall')}</div><div class="dropdown-item${currentFontSize===15?' active':''}" data-action="size" data-size="15">${t('sizeNormal')}</div><div class="dropdown-item${currentFontSize===18?' active':''}" data-action="size" data-size="18">${t('sizeLarge')}</div><div class="dropdown-item${currentFontSize===22?' active':''}" data-action="size" data-size="22">${t('sizeXLarge')}</div><div class="dropdown-section">${t('toolsSection')}</div><div class="dropdown-item" data-action="image">${t('imageAdd')}</div><div class="dropdown-section">${t('exportSection')}</div><div class="dropdown-item" data-action="share-json">${t('shareJSON')}</div><div class="dropdown-item" data-action="share-txt">${t('shareTXT')}</div><div class="dropdown-item" data-action="share-docx">${t('shareDOCX')}</div><div class="dropdown-item" data-action="share-kakao">${t('shareKakao')}</div><div class="dropdown-section"></div><div class="dropdown-item danger" data-action="delete">${t('deleteItem')}</div>`;}
  function applyUI(){
    document.body.className=settings.theme==='glass'?'glass':'';
    els.saveLabel.textContent=t('saved');els.saveBtn.textContent=t('save');els.editor.dataset.placeholder=t('placeholder');
    els.panelTitle.textContent=t('memo');document.getElementById('settingsTitle').textContent=t('settings');
    document.getElementById('themeLabel').textContent=t('theme');document.getElementById('langLabel').textContent=t('lang');
    document.getElementById('exportLabel').textContent=t('export');document.getElementById('importLabel').textContent=t('import');
    document.getElementById('refLabel').textContent=t('refLabel');document.getElementById('newNoteLabel').textContent=t('newNote');
    document.getElementById('emptyText').textContent=t('selectNote');els.searchInput.placeholder=t('search');
    document.querySelectorAll('#themeToggle .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===settings.theme));
    document.querySelectorAll('#langToggle .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===settings.lang));
    els.filterAllBtn.textContent=t('filterAll');els.filterPinnedBtn.textContent=t('filterPinned');els.filterImagesBtn.textContent=t('filterImages');
    if(refCode)els.refCodeDisplay.textContent=refCode;renderFilterTabs();renderTagChips();buildToolsMenu();
  }

  function compressImage(file,mW=300){return new Promise((r)=>{const rd=new FileReader();rd.onload=(e)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>mW){h=Math.round(h*(mW/w));w=mW;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',0.45));};img.src=e.target.result;};rd.readAsDataURL(file);});}
  async function handleImageUpload(files){
    if(!currentId){const nn={id:'n'+Date.now(),text:'',time:Date.now(),pinned:false,tags:[],images:[],links:[],fontSize:15,fontFamily:'gothic-a1'};notes.push(nn);currentId=nn.id;}
    for(const f of files){try{const du=await compressImage(f);currentImages.push(du);}catch(e){}}
    insertImagesIntoEditor();saveNote();showToast(t('imageAdded'));
  }
  function insertImagesIntoEditor(){
    if(!currentImages.length)return;
    let h='';currentImages.forEach((img,i)=>{h+=`<span contenteditable="false" style="display:inline-block;position:relative;margin:4px;vertical-align:middle;"><img src="${img}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;cursor:pointer;" data-img="${i}"><button data-rimg="${i}" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;font-size:9px;cursor:pointer;">✕</button></span>`;});
    els.editor.innerHTML+=h;
  }

  async function fetchLinkPreview(url){try{const r=await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);const j=await r.json();if(j.status==='success'&&j.data)return{url,title:j.data.title||url,description:j.data.description||'',image:j.data.image?.url||'',domain:new URL(url).hostname};}catch(e){}try{return{url,title:url,description:'',image:'',domain:new URL(url).hostname};}catch(e){return null;}}
  async function handlePaste(e){
    const text=(e.clipboardData||window.clipboardData).getData('text');const urls=text.match(/(https?:\/\/[^\s]+)/g);
    if(urls&&urls.length){e.preventDefault();for(const url of urls){const p=await fetchLinkPreview(url);if(p&&!currentLinks.find(l=>l.url===p.url)){currentLinks.push(p);showToast(t('linkAdded'));}}insertLinksIntoEditor();saveNote();}
  }
  function insertLinksIntoEditor(){
    if(!currentLinks.length)return;
    let h='';currentLinks.forEach((l,i)=>{h+=`<span contenteditable="false" style="display:block;margin:8px 0;border-radius:12px;overflow:hidden;background:${settings.theme==='glass'?'rgba(255,255,255,0.04)':'#f5f2e8'};border:1px solid ${settings.theme==='glass'?'rgba(255,255,255,0.08)':'#e0d9c4'};cursor:pointer;max-width:100%;position:relative;" data-link="${esc(l.url)}">${l.image?`<img src="${l.image}" style="width:100%;max-height:160px;object-fit:cover;display:block;">`:''}<div style="padding:10px 12px;"><div style="font-size:13px;font-weight:600;color:${settings.theme==='glass'?'#fff':'#3a3830'};">${esc(l.title)}</div>${l.description?`<div style="font-size:11px;color:#8E8E93;margin-top:2px;">${esc(l.description)}</div>`:''}<div style="font-size:10px;color:${settings.theme==='glass'?'rgba(255,255,255,0.4)':'#b0a890'};margin-top:4px;">${esc(l.domain)}</div></div><button data-rlink="${i}" style="position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;">✕</button></span>`;});
    els.editor.innerHTML+=h;
  }

  function renderFilterTabs(){const old=els.filterRow.querySelectorAll('.custom-tag');old.forEach(b=>b.remove());customTags.forEach(tag=>{const btn=document.createElement('button');btn.className='filter-tab custom-tag'+(activeFilter===tag?' active':'');btn.dataset.filter=tag;btn.innerHTML=`${esc(tag)}<span class="delete-filter" data-tag="${esc(tag)}">×</span>`;els.filterRow.insertBefore(btn,els.addFilterBtn);});}
  function renderTagChips(){if(!currentId){els.tagChipsContainer.innerHTML='';return;}const note=notes.find(n=>n.id===currentId);if(!note||!note.tags||!note.tags.length){els.tagChipsContainer.innerHTML=`<span style="font-size:11px;opacity:0.4;">${t('noTags')}</span>`;return;}els.tagChipsContainer.innerHTML=note.tags.map(tag=>`<span class="tag-chip"><span>${esc(tag)}</span><span class="remove-tag" data-tag="${esc(tag)}">×</span></span>`).join('');}

  function filtered(){let f=[...notes];const q=(els.searchInput.value||'').toLowerCase();if(q)f=f.filter(n=>stripHTML(n.text).toLowerCase().includes(q));if(activeFilter==='pinned')f=f.filter(n=>n.pinned);else if(activeFilter==='images')f=f.filter(n=>n.images&&n.images.length>0);else if(activeFilter!=='all'&&customTags.includes(activeFilter))f=f.filter(n=>n.tags&&n.tags.includes(activeFilter));return f.sort((a,b)=>b.time-a.time);}
  function renderList(){const f=filtered();if(!f.length){els.noteList.innerHTML=`<div class="empty-list">( •_•)<span>${t('noNotes')}</span></div>`;return;}els.noteList.innerHTML=f.map(n=>`<div class="note-row${n.id===currentId?' active':''}" data-id="${n.id}"><div class="note-avatar">${avatarHTML(n.id,n.text,n.images)}</div><div class="note-body">${editingSubjectId===n.id?`<input class="note-subject-input" value="${esc(getTitle(n.text))}" data-subject-id="${n.id}" maxlength="40">`:`<div class="note-subject" data-subject-id="${n.id}">${esc(getTitle(n.text))}</div>`}<div class="note-preview">${esc(getPreview(n.text)||(n.images&&n.images.length?`${n.images.length} images`:n.links&&n.links.length?`${n.links.length} links`:''))}</div></div><div class="note-meta"><span class="note-time">${fmtTime(n.time)}</span><button class="note-delete" data-del="${n.id}">✕</button></div></div>`).join('');document.querySelectorAll('.note-subject-input').forEach(inp=>{inp.focus();inp.select();inp.addEventListener('blur',()=>saveSubjectEdit(inp));inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveSubjectEdit(inp);}});});}
  function saveSubjectEdit(inp){const id=inp.dataset.subjectId;const nt=inp.value.trim();if(nt&&id){const note=notes.find(n=>n.id===id);if(note){const originalText=stripHTML(note.text);const lines=originalText.split('\n');lines[0]=nt;note.text=lines.join('\n');note.time=Date.now();DB.saveNote({...note,refCode}).catch(()=>{});}}editingSubjectId=null;renderList();}

  function openNote(id){const n=notes.find(x=>x.id===id);if(!n)return;currentId=id;els.editor.innerHTML=n.text||'';els.editorTime.textContent=fmtTime(n.time);currentImages=n.images?[...n.images]:[];currentLinks=n.links?[...n.links]:[];currentFontSize=n.fontSize||15;currentFontFamily=n.fontFamily||'gothic-a1';applyEditorStyle();els.emptyPanel.style.display='none';els.panelContent.style.display='block';if(window.innerWidth<720){els.mainPanel.classList.remove('mobile-closing');els.mainPanel.classList.add('mobile-open');}renderList();renderTagChips();buildToolsMenu();els.editor.focus();}
  function openNew(){const nn={id:'n'+Date.now(),text:'',time:Date.now(),pinned:false,tags:[],images:[],links:[],fontSize:15,fontFamily:'gothic-a1'};notes.push(nn);currentId=nn.id;els.editor.innerHTML='';els.editorTime.textContent=fmtTime(Date.now());currentImages=[];currentLinks=[];currentFontSize=15;currentFontFamily='gothic-a1';applyEditorStyle();els.emptyPanel.style.display='none';els.panelContent.style.display='block';if(window.innerWidth<720){els.mainPanel.classList.remove('mobile-closing');els.mainPanel.classList.add('mobile-open');}renderList();renderTagChips();buildToolsMenu();els.editor.focus();saveNote();}
  function closeEditor(){clearTimeout(saveTimer);saveNote();if(window.innerWidth<720){els.mainPanel.classList.add('mobile-closing');els.mainPanel.classList.remove('mobile-open');setTimeout(()=>{els.mainPanel.classList.remove('mobile-closing');currentId=null;els.editor.innerHTML='';els.editorTime.textContent='';currentImages=[];currentLinks=[];els.emptyPanel.style.display='flex';els.panelContent.style.display='none';renderList();renderTagChips();},200);}else{currentId=null;els.editor.innerHTML='';els.editorTime.textContent='';currentImages=[];currentLinks=[];els.emptyPanel.style.display='flex';els.panelContent.style.display='none';renderList();renderTagChips();}}
  function applyEditorStyle(){els.editor.style.fontSize=currentFontSize+'px';els.editor.style.fontFamily=fontFamilies[currentFontFamily]||fontFamilies['gothic-a1'];}

  async function delCurrent(){if(!currentId)return;if(!confirm(t('deleteConfirm')))return;const idToDelete=currentId;notes=notes.filter(n=>n.id!==idToDelete);try{await DB.deleteNote(idToDelete);}catch(e){}currentId=null;els.editor.innerHTML='';els.editorTime.textContent='';currentImages=[];currentLinks=[];if(window.innerWidth<720){els.mainPanel.classList.add('mobile-closing');els.mainPanel.classList.remove('mobile-open');setTimeout(()=>{els.mainPanel.classList.remove('mobile-closing');els.emptyPanel.style.display='flex';els.panelContent.style.display='none';renderList();renderTagChips();},200);}else{els.emptyPanel.style.display='flex';els.panelContent.style.display='none';renderList();renderTagChips();}}

  function shareAsJSON(){if(!currentId)return;const note=notes.find(n=>n.id===currentId);downloadBlob(new Blob([JSON.stringify(note,null,2)],{type:'application/json'}),`note_${currentId}.json`);closeDropdowns();}
  function shareAsTXT(){downloadBlob(new Blob([els.editor.innerText],{type:'text/plain'}),`note_${currentId}.txt`);closeDropdowns();}
  function shareAsDOCX(){const html=`<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><style>body{font-size:${currentFontSize}px;line-height:1.6;}</style></head><body>${els.editor.innerHTML}</body></html>`;downloadBlob(new Blob(['\ufeff'+html],{type:'application/msword'}),`note_${currentId}.doc`);showToast(t('docxExported'));closeDropdowns();}
  function shareToKakao(){const txt=els.editor.innerText.trim();if(!txt){showToast('공유할 내용 없음');return;}const ku=`kakaolink://send?text=${encodeURIComponent(txt)}`;const s=Date.now();window.location.href=ku;setTimeout(()=>{if(Date.now()-s<1500)return;navigator.clipboard.writeText(txt).then(()=>showToast('복사됨'));},800);closeDropdowns();}
  function downloadBlob(blob,filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
  function closeDropdowns(){els.toolsMenu.classList.remove('open');els.titleDropdown.classList.remove('open');}

  async function exportToFile(){const allNotes=await DB.getAllNotes();const payload={app:"AntsNote",version:"1.0",exportDate:new Date().toISOString(),data:allNotes};downloadBlob(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}),`AntsNote_Backup_${new Date().toISOString().split('T')[0]}.json`);showToast(t('exported'));}
  async function importFromFile(file){const reader=new FileReader();reader.onload=async(e)=>{try{const imported=JSON.parse(e.target.result);if(imported.app!=="AntsNote")throw new Error('Invalid');for(const note of imported.data){await DB.saveNote(note);}await loadCloud(refCode);renderAll();showToast(t('imported'));}catch(err){showToast('Invalid file');}};reader.readAsText(file);}
  function renderAll(){renderList();applyUI();if(currentId){const n=notes.find(x=>x.id===currentId);if(n){els.editor.innerHTML=n.text||'';currentImages=n.images?[...n.images]:[];currentLinks=n.links?[...n.links]:[];currentFontSize=n.fontSize||15;currentFontFamily=n.fontFamily||'gothic-a1';applyEditorStyle();els.editorTime.textContent=fmtTime(n.time);els.emptyPanel.style.display='none';els.panelContent.style.display='block';buildToolsMenu();}else closeEditor();}else{els.emptyPanel.style.display='flex';els.panelContent.style.display='none';}}

  function showTagInput(){const existing=document.querySelector('.filter-input-wrap');if(existing)existing.remove();const wrap=document.createElement('span');wrap.className='filter-input-wrap';wrap.innerHTML=`<input class="filter-input" placeholder="${t('addTag')}" maxlength="12"><button class="filter-input-confirm">✓</button>`;els.filterRow.insertBefore(wrap,els.addFilterBtn);const inp=wrap.querySelector('.filter-input');inp.focus();let done=false;const confirm=()=>{if(done)return;done=true;const name=inp.value.trim();if(name&&!customTags.includes(name)&&name!=='all'&&name!=='pinned'&&name!=='images'){customTags.push(name);saveTags();renderFilterTabs();}wrap.remove();};wrap.querySelector('.filter-input-confirm').addEventListener('mousedown',e=>{e.preventDefault();confirm();});inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();confirm();}});inp.addEventListener('blur',()=>{setTimeout(()=>{if(!done)wrap.remove();},250);});}

  els.editor.addEventListener('click',e=>{
    const rimg=e.target.closest('[data-rimg]');if(rimg){e.preventDefault();currentImages.splice(parseInt(rimg.dataset.rimg),1);els.editor.innerHTML=buildNoteHTML();saveNote();return;}
    const img=e.target.closest('img[data-img]');if(img){els.lightboxImg.src=img.src;els.lightbox.classList.add('open');return;}
    const rlink=e.target.closest('[data-rlink]');if(rlink){e.preventDefault();currentLinks.splice(parseInt(rlink.dataset.rlink),1);els.editor.innerHTML=buildNoteHTML();saveNote();return;}
    const link=e.target.closest('[data-link]');if(link){window.open(link.dataset.link,'_blank');}
  });
  function buildNoteHTML(){let h=els.editor.innerText;currentImages.forEach((img,i)=>{h+=`<span contenteditable="false" style="display:inline-block;position:relative;margin:4px;vertical-align:middle;"><img src="${img}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;cursor:pointer;" data-img="${i}"><button data-rimg="${i}" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;font-size:9px;cursor:pointer;">✕</button></span>`;});currentLinks.forEach((l,i)=>{h+=`<span contenteditable="false" style="display:block;margin:8px 0;border-radius:12px;overflow:hidden;background:${settings.theme==='glass'?'rgba(255,255,255,0.04)':'#f5f2e8'};border:1px solid ${settings.theme==='glass'?'rgba(255,255,255,0.08)':'#e0d9c4'};cursor:pointer;max-width:100%;position:relative;" data-link="${esc(l.url)}">${l.image?`<img src="${l.image}" style="width:100%;max-height:160px;object-fit:cover;display:block;">`:''}<div style="padding:10px 12px;"><div style="font-size:13px;font-weight:600;color:${settings.theme==='glass'?'#fff':'#3a3830'};">${esc(l.title)}</div>${l.description?`<div style="font-size:11px;color:#8E8E93;margin-top:2px;">${esc(l.description)}</div>`:''}<div style="font-size:10px;color:${settings.theme==='glass'?'rgba(255,255,255,0.4)':'#b0a890'};margin-top:4px;">${esc(l.domain)}</div></div><button data-rlink="${i}" style="position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;">✕</button></span>`;});return h;}

  els.lightboxClose.addEventListener('click',()=>els.lightbox.classList.remove('open'));els.lightbox.addEventListener('click',e=>{if(e.target===els.lightbox)els.lightbox.classList.remove('open');});
  els.imageFileInput.addEventListener('change',e=>{if(e.target.files.length)handleImageUpload(e.target.files);els.imageFileInput.value='';});

  els.titleDropdown.addEventListener('click',e=>{e.stopPropagation();els.titleDropdown.classList.toggle('open');els.toolsMenu.classList.toggle('open');buildToolsMenu();});
  document.addEventListener('click',()=>closeDropdowns());
  els.toolsMenu.addEventListener('click',e=>{const item=e.target.closest('.dropdown-item');if(!item)return;const action=item.dataset.action;if(action==='font'){currentFontFamily=item.dataset.font;applyEditorStyle();closeDropdowns();saveNote();}else if(action==='size'){currentFontSize=parseInt(item.dataset.size);applyEditorStyle();closeDropdowns();saveNote();}else if(action==='image'){els.imageFileInput.click();closeDropdowns();}else if(action==='share-json')shareAsJSON();else if(action==='share-txt')shareAsTXT();else if(action==='share-docx')shareAsDOCX();else if(action==='share-kakao')shareToKakao();else if(action==='delete'){delCurrent();closeDropdowns();}});

  let longPressTimer=null;
  els.noteList.addEventListener('touchstart',e=>{const subjectEl=e.target.closest('[data-subject-id]');if(subjectEl&&!e.target.closest('input')){longPressTimer=setTimeout(()=>{editingSubjectId=subjectEl.dataset.subjectId;renderList();},500);}},{passive:true});
  els.noteList.addEventListener('touchend',()=>{clearTimeout(longPressTimer);});
  els.noteList.addEventListener('touchmove',()=>{clearTimeout(longPressTimer);});

  els.noteList.addEventListener('click',e=>{const del=e.target.closest('[data-del]');if(del){e.stopPropagation();const id=del.dataset.del;notes=notes.filter(n=>n.id!==id);DB.deleteNote(id).catch(()=>{});if(currentId===id){currentId=null;els.editor.innerHTML='';els.editorTime.textContent='';currentImages=[];currentLinks=[];els.emptyPanel.style.display='flex';els.panelContent.style.display='none';}renderAll();return;}const se=e.target.closest('[data-subject-id]');if(se&&!e.target.closest('input')){e.stopPropagation();editingSubjectId=se.dataset.subjectId;renderList();return;}if(e.target.closest('input'))return;const row=e.target.closest('.note-row');if(row)openNote(row.dataset.id);});
  els.searchInput.addEventListener('input',renderList);els.newNoteBtn.addEventListener('click',openNew);els.backBtn.addEventListener('click',closeEditor);
  els.saveBtn.addEventListener('click',()=>{closeEditor();showToast(t('savedToast'));});
  els.editor.addEventListener('input',autoSave);els.editor.addEventListener('paste',handlePaste);

  els.addTagToNoteBtn.addEventListener('click',()=>{if(!currentId)return;const tn=prompt(t('addTagToNote'));if(tn&&tn.trim()){const note=notes.find(n=>n.id===currentId);if(note){if(!note.tags)note.tags=[];if(!note.tags.includes(tn.trim())){note.tags.push(tn.trim());if(!customTags.includes(tn.trim())){customTags.push(tn.trim());saveTags();}DB.saveNote({...note,refCode}).catch(()=>{});renderTagChips();renderFilterTabs();}}}});
  els.tagChipsContainer.addEventListener('click',e=>{const rem=e.target.closest('.remove-tag');if(rem&&currentId){const note=notes.find(n=>n.id===currentId);if(note&&note.tags){note.tags=note.tags.filter(t=>t!==rem.dataset.tag);DB.saveNote({...note,refCode}).catch(()=>{});renderTagChips();renderFilterTabs();renderList();}}});
  els.filterRow.addEventListener('click',e=>{const tab=e.target.closest('.filter-tab');if(!tab)return;const delBtn=e.target.closest('.delete-filter');if(delBtn){e.stopPropagation();customTags=customTags.filter(t=>t!==delBtn.dataset.tag);saveTags();notes.forEach(n=>{if(n.tags)n.tags=n.tags.filter(t=>t!==delBtn.dataset.tag);});if(activeFilter===delBtn.dataset.tag)activeFilter='all';renderFilterTabs();document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));els.filterAllBtn.classList.add('active');renderList();renderTagChips();return;}document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');activeFilter=tab.dataset.filter;renderList();});
  els.addFilterBtn.addEventListener('click',showTagInput);
  els.settingsBtn.addEventListener('click',()=>{els.refCodeDisplay.textContent=refCode;els.settingsOverlay.classList.add('open');});
  els.closeSettings.addEventListener('click',()=>els.settingsOverlay.classList.remove('open'));
  els.settingsOverlay.addEventListener('click',e=>{if(e.target===els.settingsOverlay)els.settingsOverlay.classList.remove('open');});
  els.themeToggle.addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;settings.theme=b.dataset.theme;saveSettings();applyUI();});
  els.langToggle.addEventListener('click',e=>{const b=e.target.closest('.toggle-btn');if(!b)return;settings.lang=b.dataset.lang;saveSettings();applyUI();renderAll();});
  els.exportBtn.addEventListener('click',exportToFile);els.importBtn.addEventListener('click',()=>els.importFile.click());
  els.importFile.addEventListener('change',e=>{if(e.target.files[0])importFromFile(e.target.files[0]);els.importFile.value='';});
  window.addEventListener('resize',()=>{if(window.innerWidth>=720){els.mainPanel.classList.remove('mobile-open','mobile-closing');if(currentId){els.emptyPanel.style.display='none';els.panelContent.style.display='block';}}});
  els.panelContent.addEventListener('dragover',e=>{e.preventDefault();});els.panelContent.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)handleImageUpload(e.dataTransfer.files);});

  if(location.search.includes('reset')){indexedDB.deleteDatabase('AntsNotesDBv2');localStorage.removeItem('ants_ref');localStorage.removeItem('ants_settings');localStorage.removeItem('ants_tags');document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-size:18px;color:#8B6914;">초기화 완료 — 앱을 새로고침하세요</div>';}
  else{(async()=>{loadSettings();loadTags();const savedRef=localStorage.getItem('ants_ref');if(savedRef){refCode=savedRef;await loadCloud(savedRef);}else{refCode=genRef();notes=[];localStorage.setItem('ants_ref',refCode);}applyUI();renderAll();})();}
})();
</script>
</body>
</html>
